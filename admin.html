<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Akrilik Custom Maumbi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-pdf { background-color: #e74c3c; color: white; border: none; }
        .btn-pdf:hover { background-color: #c0392b; color: white; }
    </style>
</head>
<body>

<div class="container py-4">
    <h3 class="mb-4 text-center">Dashboard Admin Maumbi</h3>
    
    <div class="d-flex justify-content-between mb-3">
        <button onclick="fetchData()" class="btn btn-primary btn-sm">Refresh Data</button>
        <button id="btnDownload" onclick="downloadPDF()" class="btn btn-pdf btn-sm">Download PDF</button>
    </div>

    <div class="card p-3">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Nama</th>
                        <th>Waktu</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="3" class="text-center">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // KONFIGURASI SUPABASE (Ganti dengan URL & Key Anda jika belum terhubung)
    const SUPABASE_URL = "https://cvswzigomnpnllsgcqoc.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let attendanceData = [];

    // 1. Fungsi Ambil Data dari Database
    async function fetchData() {
        const { data, error } = await supabase
            .from('attendance')
            .select(`*, employees(name)`)
            .order('check_in', { ascending: false });

        if (error) {
            console.error(error);
            return;
        }

        attendanceData = data;
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        data.forEach(item => {
            const row = `<tr>
                <td>${item.employees?.name || 'Tanpa Nama'}</td>
                <td>${new Date(item.check_in).toLocaleTimeString('id-ID')}</td>
                <td><span class="badge ${item.status === 'Hadir' ? 'bg-success' : 'bg-warning'}">${item.status}</span></td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    // 2. Fungsi Download PDF (Perbaikan Utama)
    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        if (attendanceData.length === 0) {
            Swal.fire("Gagal", "Tidak ada data untuk didownload", "error");
            return;
        }

        doc.text("Laporan Absensi Akrilik Custom Maumbi", 14, 15);
        
        const rows = [];
        attendanceData.forEach(item => {
            rows.push([
                item.employees?.name || 'Unknown',
                new Date(item.check_in).toLocaleString('id-ID'),
                item.status,
                item.is_on_site ? 'Di Lokasi' : 'Luar Lokasi'
            ]);
        });

        doc.autoTable({
            head: [['Nama', 'Waktu', 'Status', 'Lokasi']],
            body: rows,
            startY: 25,
        });

        doc.save("Laporan_Absensi_Maumbi.pdf");
    }

    // Jalankan saat halaman dibuka
    fetchData();
</script>
</body>
</html>
