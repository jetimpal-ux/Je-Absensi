<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Absen - Bitung</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-4">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black italic uppercase">Admin <span class="text-blue-600">Absen</span></h1>
            <button onclick="location.reload()" class="bg-blue-600 text-white p-3 rounded-xl"><i class="fa fa-sync"></i></button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border p-4 mb-8">
            <h2 class="font-black mb-4 uppercase text-sm tracking-widest text-slate-400">Kehadiran Pegawai</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="border-b">
                            <th class="p-3">Nama</th>
                            <th class="p-3">Masuk</th>
                            <th class="p-3">Pulang</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border p-4">
            <h2 class="font-black mb-4 uppercase text-sm tracking-widest text-amber-500">Persetujuan Izin</h2>
            <div id="list-izin" class="space-y-4">
                </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://cvswzigomnpnllsgcqoc.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function loadData() {
            // Load Absensi
            const { data: abs } = await sb.from('absensi').select('*, pegawai(nama)').order('tanggal', {ascending:false});
            document.getElementById('table-body').innerHTML = abs.map(r => `
                <tr class="border-b">
                    <td class="p-3 font-bold">${r.pegawai?.nama} <br> <span class="text-[10px] text-slate-400">${r.tanggal}</span></td>
                    <td class="p-3 text-blue-600 font-bold">${r.jam_masuk}</td>
                    <td class="p-3 text-amber-600 font-bold">${r.jam_keluar || '--'}</td>
                </tr>
            `).join('');

            // Load Izin
            const { data: izn } = await sb.from('izin').select('*, pegawai(nama)').order('id', {ascending:false});
            document.getElementById('list-izin').innerHTML = izn.map(i => `
                <div class="p-4 border rounded-2xl bg-slate-50">
                    <div class="flex justify-between items-start mb-2">
                        <span class="font-black text-slate-800">${i.pegawai?.nama}</span>
                        <span class="text-[10px] px-2 py-1 bg-white border rounded-full font-bold">${i.status || 'Pending'}</span>
                    </div>
                    <p class="text-xs text-slate-500 mb-3 italic">"${i.alasan}"</p>
                    <div class="flex gap-2">
                        <button onclick="setIzin('${i.id}', 'Disetujui')" class="flex-1 bg-emerald-500 text-white py-2 rounded-lg text-xs font-bold">Setujui</button>
                        <button onclick="setIzin('${i.id}', 'Ditolak')" class="flex-1 bg-rose-500 text-white py-2 rounded-lg text-xs font-bold">Tolak</button>
                    </div>
                </div>
            `).join('');
        }

        async function setIzin(id, status) {
            const { error } = await sb.from('izin').update({ status: status }).eq('id', id);
            if (!error) { alert("Status diperbarui!"); loadData(); }
        }

        loadData();
    </script>
</body>
</html>
