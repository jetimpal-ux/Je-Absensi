<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Absen Pro - Bitung</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        @media print { .no-print { display: none !important; } body { background: white; padding: 0; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6 no-print">
            <div>
                <h1 class="text-2xl font-black italic uppercase tracking-tighter text-slate-800">ADMIN <span class="text-blue-600">PANEL</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Manembo-nembo, Bitung</p>
            </div>
            <button onclick="loadSemuaData()" class="bg-blue-600 text-white p-3 rounded-2xl shadow-lg"><i class="fa fa-sync"></i></button>
        </div>

        <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm mb-6 no-print">
            <div class="grid grid-cols-2 gap-4">
                <select id="filter-bulan" onchange="loadSemuaData()" class="bg-slate-50 border-2 border-slate-100 p-3 rounded-xl font-bold outline-none">
                    <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
                    <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
                    <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
                    <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
                </select>
                <button onclick="window.print()" class="bg-slate-800 text-white rounded-xl font-bold flex items-center justify-center gap-2">
                    <i class="fa fa-print"></i> <span class="hidden md:inline">Cetak</span>
                </button>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden mb-8">
            <div class="p-5 border-b border-slate-50 bg-slate-50/50 flex justify-between items-center">
                <h3 class="font-black uppercase text-slate-800 text-sm tracking-tight flex items-center gap-2">
                    <i class="fa fa-clock text-blue-600"></i> Monitoring Jam Absen
                </h3>
                <span id="label-periode" class="text-[10px] font-black bg-white border px-3 py-1 rounded-full uppercase text-slate-500 italic">...</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-white border-b border-slate-100">
                            <th class="p-4 text-[10px] font-black uppercase text-slate-400">Pegawai & Tgl</th>
                            <th class="p-4 text-[10px] font-black uppercase text-slate-400 text-center">Masuk</th>
                            <th class="p-4 text-[10px] font-black uppercase text-slate-400 text-center">Pulang</th>
                        </tr>
                    </thead>
                    <tbody id="body-absen" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>

        <div class="no-print">
            <h3 class="font-black uppercase text-slate-800 mb-4 px-2 text-sm tracking-tight flex items-center gap-2">
                <i class="fa fa-envelope-open text-amber-500"></i> Persetujuan Izin
            </h3>
            <div id="list-izin" class="space-y-4 mb-20"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://cvswzigomnpnllsgcqoc.supabase.co'; // Ganti dengan URL bapak
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ'; // Ganti dengan Key bapak
        const sb = supabase.createClient(SB_URL, SB_KEY);

        const d = new Date();
        document.getElementById('filter-bulan').value = d.getMonth() + 1;

        async function loadSemuaData() {
            const bulan = parseInt(document.getElementById('filter-bulan').value);
            const tahun = d.getFullYear();
            
            // LOGIKA OTOMATIS: Cari hari pertama dan hari terakhir bulan itu
            const firstDay = new Date(tahun, bulan - 1, 1).toISOString().split('T')[0];
            const lastDay = new Date(tahun, bulan, 0).toISOString().split('T')[0];
            
            document.getElementById('label-periode').innerText = document.getElementById('filter-bulan').options[document.getElementById('filter-bulan').selectedIndex].text + " " + tahun;

            try {
                const { data: absData, error: absErr } = await sb
                    .from('absensi')
                    .select('*, pegawai(nama)')
                    .gte('tanggal', firstDay)
                    .lte('tanggal', lastDay)
                    .order('tanggal', { ascending: false });

                if (absErr) throw absErr;
                renderAbsensi(absData);
            } catch (err) {
                document.getElementById('body-absen').innerHTML = `<tr><td colspan="3" class="p-5 text-center text-red-500 font-bold text-xs">Error: ${err.message}</td></tr>`;
            }

            // Load Izin
            const { data: iznData } = await sb.from('izin').select('*, pegawai(nama)').order('id', {ascending:false});
            renderIzin(iznData);
        }

        function renderAbsensi(data) {
            const body = document.getElementById('body-absen');
            if(!data || data.length === 0) {
                body.innerHTML = `<tr><td colspan="3" class="p-10 text-center font-bold text-slate-300 italic">Belum ada data bulan ini</td></tr>`;
                return;
            }
            body.innerHTML = data.map(row => `
                <tr class="hover:bg-blue-50/30">
                    <td class="p-4">
                        <span class="block font-black text-slate-800 text-sm uppercase">${row.pegawai?.nama || 'Unknown'}</span>
                        <span class="text-[9px] font-bold text-slate-400 italic">${row.tanggal}</span>
                    </td>
                    <td class="p-4 text-center">
                        <span class="text-base font-black text-blue-600">${row.jam_masuk || '--'}</span>
                    </td>
                    <td class="p-4 text-center">
                        <span class="text-base font-black text-amber-600">${row.jam_keluar || '--'}</span>
                    </td>
                </tr>
            `).join('');
        }

        function renderIzin(data) {
            const list = document.getElementById('list-izin');
            if(!data || data.length === 0) {
                list.innerHTML = `<p class="p-4 text-slate-400 font-bold italic text-center">Tidak ada data izin.</p>`;
                return;
            }
            list.innerHTML = data.map(i => `
                <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-black text-slate-800 uppercase text-xs">${i.pegawai?.nama}</span>
                        <span class="text-[9px] px-2 py-1 bg-blue-100 text-blue-700 rounded-full font-black uppercase">${i.status || 'Pending'}</span>
                    </div>
                    <p class="text-xs text-slate-500 mb-3 italic">"${i.alasan}"</p>
                    <div class="flex gap-2">
                        <button onclick="updateStatusIzin('${i.id}', 'Disetujui')" class="flex-1 bg-emerald-500 text-white py-2 rounded-xl text-[10px] font-black uppercase">Setujui</button>
                        <button onclick="updateStatusIzin('${i.id}', 'Ditolak')" class="flex-1 bg-rose-500 text-white py-2 rounded-xl text-[10px] font-black uppercase">Tolak</button>
                    </div>
                </div>
            `).join('');
        }

        async function updateStatusIzin(id, status) {
            const { error } = await sb.from('izin').update({ status: status }).eq('id', id);
            if (!error) { alert("Status diperbarui!"); loadSemuaData(); }
        }

        loadSemuaData();
    </script>
</body>
</html>
