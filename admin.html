<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Akrilik Custom Maumbi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; padding: 15px; }
        .card-main { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: white; padding: 20px; }
        .btn-pdf { background-color: #ff4757; color: white; border: none; }
        .status-badge { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="container card-main mt-3">
    <h4 class="text-center mb-4">Dashboard Admin Maumbi</h4>
    
    <div class="d-flex justify-content-between mb-3">
        <button onclick="fetchData()" class="btn btn-primary btn-sm">Refresh Data</button>
        <button onclick="downloadPDF()" class="btn btn-pdf btn-sm">Download PDF</button>
    </div>

    <div class="table-responsive">
        <table class="table table-hover">
            <thead class="table-light">
                <tr>
                    <th>Nama</th>
                    <th>Masuk</th>
                    <th>Pulang</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="4" class="text-center py-4">Memuat data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // --- KONFIGURASI ---
    const SB_URL = "https://cvswzigomnpnllsgcqoc.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ";
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    let allAttendance = [];

    async function fetchData() {
        try {
            // 1. Ambil data karyawan
            const { data: emps, error: err1 } = await supabase.from('employees').select('employee_code, name');
            if (err1) throw err1;

            // 2. Ambil data absen
            const { data: atts, error: err2 } = await supabase.from('attendance').select('*').order('check_in', { ascending: false });
            if (err2) throw err2;

            // 3. Gabungkan data
            allAttendance = atts.map(a => {
                const emp = emps.find(e => e.employee_code === a.employee_code);
                return {
                    ...a,
                    nama_pegawai: emp ? emp.name : "User-" + a.employee_code.substring(0,4)
                };
            });

            renderTable();
        } catch (e) {
            document.getElementById('tableBody').innerHTML = `<tr><td colspan="4" class="text-center text-danger">Error: ${e.message}</td></tr>`;
        }
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        if (allAttendance.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center">Belum ada data hari ini</td></tr>';
            return;
        }

        allAttendance.forEach(item => {
            const tMasuk = new Date(item.check_in).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
            const tPulang = item.check_out ? new Date(item.check_out).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}) : '--:--';
            
            tbody.innerHTML += `
                <tr>
                    <td><b>${item.nama_pegawai}</b></td>
                    <td>${tMasuk}</td>
                    <td>${tPulang}</td>
                    <td><span class="badge ${item.status === 'Hadir' ? 'bg-success' : 'bg-warning'}">${item.status}</span></td>
                </tr>
            `;
        });
    }

    function downloadPDF() {
        if (allAttendance.length === 0) return Swal.fire("Data Kosong", "Belum ada data untuk diunduh", "info");
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(16);
        doc.text("Laporan Absensi Maumbi", 14, 15);
        doc.setFontSize(10);
        doc.text(`Dicetak: ${new Date().toLocaleString('id-ID')}`, 14, 22);

        const rows = allAttendance.map(d => [
            d.nama_pegawai,
            new Date(d.check_in).toLocaleTimeString('id-ID'),
            d.check_out ? new Date(d.check_out).toLocaleTimeString('id-ID') : '-',
            d.status
        ]);

        doc.autoTable({
            head: [['Nama Pegawai', 'Jam Masuk', 'Jam Pulang', 'Status']],
            body: rows,
            startY: 28,
            theme: 'grid'
        });

        doc.save("Laporan_Absensi_Maumbi.pdf");
    }

    fetchData();
</script>
</body>
</html>
