<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manajemen Absensi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @media print { .no-print { display: none !important; } }
        .modal { display: none; position: fixed; z-index: 50; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
    </style>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold uppercase text-slate-800">Laporan Absensi</h1>
            <div class="flex gap-2">
                <button onclick="bukaModal()" class="no-print bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl font-bold text-xs shadow-md">
                    + INPUT IZIN/SAKIT
                </button>
                <button onclick="window.print()" class="no-print bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-xl font-bold text-xs shadow-md flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M2.5 8a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1z"/><path d="M5 1a2 2 0 0 0-2 2v2H2a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h1v1a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-1h1a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-1V3a2 2 0 0 0-2-2H5zM4 3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2H4V3zm1 5a2 2 0 0 0-2 2v1H2a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v-1a2 2 0 0 0-2-2H5zm7 2v3a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1z"/></svg>
                    CETAK
                </button>
            </div>
        </div>
        
        <div class="no-print grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Pilih Pegawai:</label>
                <select id="pilihPegawai" onchange="loadData()" class="w-full p-3 rounded-xl shadow-sm font-bold border-none"></select>
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Pilih Bulan:</label>
                <select id="bulan" onchange="loadData()" class="w-full p-3 rounded-xl shadow-sm font-bold border-none">
                    <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
                    <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
                    <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
                    <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
                </select>
            </div>
        </div>

        <div class="bg-blue-600 p-6 rounded-3xl text-white mb-6 shadow-lg">
            <h2 class="font-bold mb-4 uppercase text-xs italic opacity-80">Ringkasan Kehadiran</h2>
            <div id="rekap-area">Memuat data...</div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm overflow-x-auto border border-slate-200">
            <h2 class="font-bold mb-4 uppercase text-slate-400 text-[10px] italic">Rincian Tanggal</h2>
            <table class="w-full text-left text-sm">
                <thead>
                    <tr class="border-b text-slate-400 uppercase text-[10px]">
                        <th class="py-2">Pegawai / Tanggal</th>
                        <th>Status</th>
                        <th>Masuk / Pulang</th>
                    </tr>
                </thead>
                <tbody id="log-area"></tbody>
            </table>
        </div>
    </div>

    <div id="modalIzin" class="modal flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl">
            <h2 class="font-bold text-xl mb-4">Input Izin/Sakit</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-400">NAMA PEGAWAI</label>
                    <select id="formPegawai" class="w-full p-3 border rounded-xl"></select>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400">TANGGAL</label>
                    <input type="date" id="formTanggal" class="w-full p-3 border rounded-xl">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400">KETERANGAN STATUS</label>
                    <select id="formStatus" class="w-full p-3 border rounded-xl font-bold">
                        <option value="Izin">Izin</option>
                        <option value="Sakit">Sakit</option>
                        <option value="Alpa">Tanpa Keterangan (Alpa)</option>
                    </select>
                </div>
                <div class="flex gap-2 pt-4">
                    <button onclick="tutupModal()" class="flex-1 bg-slate-200 p-3 rounded-xl font-bold">BATAL</button>
                    <button onclick="simpanIzin()" class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold">SIMPAN DATA</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // KREDENSIAL SUPABASE BAPAK
        const SB_URL = 'https://cvswzigomnpnllsgcqoc.supabase.co' ; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ'; 
        const sb = supabase.createClient(SB_URL, SB_KEY);

        function bukaModal() { document.getElementById('modalIzin').style.display = 'flex'; }
        function tutupModal() { document.getElementById('modalIzin').style.display = 'none'; }

        // AMBIL DATA PEGAWAI UNTUK DROPDOWN
        async function getPegawai() {
            const { data } = await sb.from('pegawai').select('id, nama').order('nama');
            let opt = '<option value="semua">-- Semua Pegawai --</option>';
            let optForm = '';
            data.forEach(p => {
                opt += `<option value="${p.nama}">${p.nama}</option>`;
                optForm += `<option value="${p.id}">${p.nama}</option>`;
            });
            document.getElementById('pilihPegawai').innerHTML = opt;
            document.getElementById('formPegawai').innerHTML = optForm;
        }

        // FUNGSI SIMPAN IZIN KE DATABASE
        async function simpanIzin() {
            const pegId = document.getElementById('formPegawai').value;
            const tgl = document.getElementById('formTanggal').value;
            const stat = document.getElementById('formStatus').value;

            if(!tgl) return Swal.fire("Pilih Tanggal!", "", "warning");

            Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading() });

            // Simpan ke tabel 'absensi'
            const { error } = await sb.from('absensi').insert([
                { pegawai_id: pegId, tanggal: tgl, status: stat }
            ]);

            if(error) {
                Swal.fire("Gagal", error.message, "error");
            } else {
                Swal.fire("Berhasil", `Data ${stat} telah dicatat`, "success");
                tutupModal();
                loadData();
            }
        }

        // AMBIL & FILTER DATA UNTUK LAPORAN
        async function loadData() {
            const bulanPilih = document.getElementById('bulan').value;
            const namaPilih = document.getElementById('pilihPegawai').value;
            
            const { data: abs } = await sb.from('absensi').select('*, pegawai(nama)');
            
            let logHtml = '';
            let rekapData = {};

            abs.forEach(r => {
                const tgl = new Date(r.tanggal);
                const namaPegawai = r.pegawai?.nama || 'Unknown';
                
                if ((tgl.getMonth() + 1) == bulanPilih && (namaPilih === 'semua' || namaPegawai === namaPilih)) {
                    if(!rekapData[namaPegawai]) rekapData[namaPegawai] = {h:0, s:0, i:0, a:0};
                    if(r.status === 'Hadir') rekapData[namaPegawai].h++;
                    else if(r.status === 'Sakit') rekapData[namaPegawai].s++;
                    else if(r.status === 'Izin') rekapData[namaPegawai].i++;
                    else if(r.status === 'Alpa') rekapData[namaPegawai].a++;
                    
                    let sColor = r.status === 'Hadir' ? 'text-green-600' : (r.status === 'Sakit' ? 'text-blue-600' : 'text-red-600');

                    logHtml += `
                        <tr class="border-b">
                            <td class="py-3 font-bold">${namaPegawai}<br><small class="text-slate-400 font-normal">${r.tanggal}</small></td>
                            <td class="${sColor} font-bold text-xs uppercase">${r.status}</td>
                            <td class="text-xs text-slate-500 font-mono">${r.jam_masuk || '--'} / ${r.jam_keluar || '--'}</td>
                        </tr>`;
                }
            });

            // Bangun Tabel Rekap di Kotak Biru
            let rekapHtml = `<table class="w-full text-[10px]">
                <tr class="border-b border-blue-400 opacity-70 text-left"><th>NAMA</th><th>H</th><th>S</th><th>I</th><th>A</th></tr>`;
            
            Object.keys(rekapData).forEach(n => {
                const d = rekapData[n];
                rekapHtml += `<tr class="border-b border-blue-400/30"><td class="py-2 font-bold">${n}</td><td>${d.h}</td><td>${d.s}</td><td>${d.i}</td><td class="text-red-200">${d.a}</td></tr>`;
            });

            document.getElementById('log-area').innerHTML = logHtml || '<tr><td colspan="3" class="p-8 text-center text-slate-400 font-bold italic uppercase">Data tidak ditemukan</td></tr>';
            document.getElementById('rekap-area').innerHTML = rekapHtml + '</table>';
        }

        async function init() {
            await getPegawai();
            loadData();
            document.getElementById('formTanggal').valueAsDate = new Date();
        }
        init();
    </script>
</body>
</html>
