<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Rekap Bulanan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-4 uppercase">Laporan Absensi</h1>
        
        <select id="bulan" onchange="loadData()" class="w-full p-4 rounded-xl mb-6 shadow-sm font-bold">
            <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
            <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
            <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
            <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
        </select>

        <div class="bg-blue-600 p-6 rounded-3xl text-white mb-6 shadow-lg">
            <h2 class="font-bold mb-4 uppercase text-sm italic">Rekap Kehadiran & Jam Kerja</h2>
            <div id="rekap-area">Memuat rekap...</div>
        </div>

        <div class="bg-white p-4 rounded-3xl shadow-sm overflow-x-auto">
            <table class="w-full text-left text-sm">
                <thead><tr class="border-b"><th class="py-2">Nama</th><th>Masuk</th><th>Pulang</th></tr></thead>
                <tbody id="log-area"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SB_URL = 'https://cvswzigomnpnllsgcqoc.supabase.co'; // Isikan URL Supabase Bapak
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ'; // Isikan Anon Key Supabase Bapak
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function loadData() {
            const bulan = document.getElementById('bulan').value;
            const { data: abs } = await sb.from('absensi').select('*, pegawai(nama)');
            
            // Logika Rekap Sederhana
            let logHtml = '';
            let rekapHtml = '<table class="w-full text-xs"><tr><th>Nama</th><th>Hadir</th><th>Total Jam</th></tr>';
            
            let rekapData = {};

            abs.forEach(r => {
                const nama = r.pegawai?.nama || 'Unknown';
                if(!rekapData[nama]) rekapData[nama] = {h:0, j:0};
                rekapData[nama].h++;
                
                logHtml += `<tr class="border-b"><td class="py-3"><b>${nama}</b><br><small>${r.tanggal}</small></td><td class="text-blue-600">${r.jam_masuk||'--'}</td><td class="text-orange-600">${r.jam_keluar||'--'}</td></tr>`;
            });

            Object.keys(rekapData).forEach(n => {
                rekapHtml += `<tr class="border-b border-blue-400"><td class="py-2">${n}</td><td>${rekapData[n].h}</td><td>--</td></tr>`;
            });

            document.getElementById('log-area').innerHTML = logHtml;
            document.getElementById('rekap-area').innerHTML = rekapHtml + '</table>';
        }
        loadData();
    </script>
</body>
</html>
