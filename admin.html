<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Akrilik Custom Maumbi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .dashboard-container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-title { font-weight: bold; color: #333; margin-bottom: 20px; }
        .table thead { background-color: #f1f3f5; }
        .btn-download { background-color: #ff4757; color: white; border: none; }
        .btn-download:hover { background-color: #ff6b81; color: white; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <h3 class="text-center header-title">Dashboard Admin Maumbi</h3>
    
    <div class="d-flex justify-content-between mb-3">
        <button onclick="fetchData()" class="btn btn-primary btn-sm">Refresh Data</button>
        <button onclick="downloadPDF()" class="btn btn-download btn-sm">Download PDF</button>
    </div>

    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Waktu</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="3" class="text-center text-muted">Memuat data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // MASUKKAN KONFIGURASI SUPABASE ANDA DI SINI
    const SUPABASE_URL = "https://cvswzigomnpnllsgcqoc.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let attendanceData = [];

    async function fetchData() {
        try {
            // 1. Ambil data absen
            const { data: attendance, error: attError } = await supabase
                .from('attendance')
                .select('*')
                .order('check_in', { ascending: false });

            if (attError) throw attError;

            // 2. Ambil data karyawan (Tanpa password)
            const { data: employees, error: empError } = await supabase
                .from('employees')
                .select('employee_code, name');

            if (empError) throw empError;

            // 3. Gabungkan data
            attendanceData = attendance.map(att => {
                const emp = employees.find(e => e.employee_code === att.employee_code);
                return {
                    ...att,
                    emp_name: emp ? emp.name : 'User ' + att.employee_code.substring(0,5)
                };
            });

            renderTable();
        } catch (err) {
            console.error(err);
            document.getElementById('tableBody').innerHTML = `<tr><td colspan="3" class="text-center text-danger">Error: ${err.message}</td></tr>`;
        }
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        if (attendanceData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="text-center">Belum ada data masuk</td></tr>';
            return;
        }

        attendanceData.forEach(item => {
            const time = new Date(item.check_in).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            const row = `<tr>
                <td><strong>${item.emp_name}</strong></td>
                <td>${time}</td>
                <td><span class="badge ${item.status === 'Hadir' ? 'bg-success' : 'bg-warning'}">${item.status}</span></td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        if (attendanceData.length === 0) {
            Swal.fire("Info", "Data masih kosong, tidak ada yang bisa diunduh", "info");
            return;
        }

        doc.setFontSize(16);
        doc.text("Laporan Absensi Pegawai", 14, 15);
        doc.setFontSize(10);
        doc.text("Akrilik Custom Maumbi", 14, 22);

        const body = attendanceData.map(item => [
            item.emp_name,
            new Date(item.check_in).toLocaleString('id-ID'),
            item.status,
            item.is_on_site ? 'Kantor' : 'Luar Kantor'
        ]);

        doc.autoTable({
            head: [['Nama', 'Waktu', 'Status', 'Lokasi']],
            body: body,
            startY: 30,
            theme: 'grid'
        });

        doc.save("Laporan_Absen_Maumbi.pdf");
    }

    // Jalankan otomatis saat buka halaman
    fetchData();
</script>

</body>
</html>
