<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Rekap Absensi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        @media print { .no-print { display: none; } body { background: white; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tighter italic uppercase">Admin <span class="text-blue-600">AbsenFlow</span></h1>
                <p class="text-slate-500 font-bold text-sm">Rekapitulasi Kehadiran Pegawai - Manembo-nembo</p>
            </div>
            <div class="flex gap-2 no-print">
                <button onclick="window.print()" class="bg-white border-2 border-slate-200 px-6 py-3 rounded-2xl font-bold flex items-center gap-2 hover:bg-slate-50 transition-all">
                    <i class="fa fa-print"></i> Cetak Laporan
                </button>
                <button onclick="fetchData()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold flex items-center gap-2 shadow-lg shadow-blue-200 hover:scale-105 transition-all">
                    <i class="fa fa-sync"></i> Refresh Data
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 no-print">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Absensi</p>
                <h3 id="stat-total" class="text-3xl font-black text-slate-800">0</h3>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Hadir Hari Ini</p>
                <h3 id="stat-today" class="text-3xl font-black text-blue-600">0</h3>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Pegawai</p>
                <h3 id="stat-pegawai" class="text-3xl font-black text-slate-800">0</h3>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-100">
                            <th class="p-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Tanggal</th>
                            <th class="p-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Nama Pegawai</th>
                            <th class="p-6 text-[10px] font-black uppercase text-slate-400 tracking-widest text-center">Masuk</th>
                            <th class="p-6 text-[10px] font-black uppercase text-slate-400 tracking-widest text-center">Pulang</th>
                            <th class="p-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Lokasi</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-50">
                        <tr>
                            <td colspan="5" class="p-10 text-center font-bold text-slate-400 italic">Sedang mengambil data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://cvswzigomnpnllsgcqoc.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function fetchData() {
            try {
                // 1. Ambil data absensi gabung dengan data pegawai
                const { data, error } = await sb
                    .from('absensi')
                    .select('*, pegawai(nama)')
                    .order('tanggal', { ascending: false });

                if (error) throw error;

                const tbody = document.getElementById('table-body');
                const today = new Date().toISOString().split('T')[0];
                
                // Update Stats
                document.getElementById('stat-total').innerText = data.length;
                document.getElementById('stat-today').innerText = data.filter(d => d.tanggal === today).length;
                
                const { count } = await sb.from('pegawai').select('*', { count: 'exact', head: true });
                document.getElementById('stat-pegawai').innerText = count;

                // Render Table
                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center font-bold text-slate-400 italic">Belum ada data absensi</td></tr>`;
                    return;
                }

                tbody.innerHTML = data.map(row => `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-6 font-bold text-slate-600">${row.tanggal}</td>
                        <td class="p-6 font-black text-slate-800">${row.pegawai ? row.pegawai.nama : 'Unknown'}</td>
                        <td class="p-6 text-center font-extrabold text-blue-600">${row.jam_masuk || '--:--'}</td>
                        <td class="p-6 text-center font-extrabold text-amber-600">${row.jam_keluar || '--:--'}</td>
                        <td class="p-6 text-[10px] font-bold">
                            <a href="https://www.google.com/maps?q=${row.lokasi_masuk}" target="_blank" class="text-blue-500 hover:underline">
                                <i class="fa fa-map-marker-alt"></i> Lihat Lokasi
                            </a>
                        </td>
                    </tr>
                `).join('');

            } catch (err) {
                console.error(err);
                alert("Gagal mengambil data: " + err.message);
            }
        }

        // Panggil data saat halaman dibuka
        fetchData();
    </script>
</body>
</html>
