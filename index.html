<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akrilik Custom Maumbi - System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .btn-blue { background: #2563eb; color: white; font-weight: 800; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
        .btn-disabled { background: #cbd5e1 !important; color: #64748b !important; cursor: not-allowed; }
        .nav-active { color: #2563eb; border-bottom: 4px solid #2563eb; font-weight: 800; }
    </style>
</head>
<body class="pb-10">

    <nav class="fixed top-0 left-0 right-0 z-[999] bg-white border-b shadow-sm flex text-center">
        <button onclick="renderPage('absen')" id="nav-absen" class="flex-1 py-4 text-[10px] font-black uppercase nav-active tracking-widest">📲 Absen</button>
        <button onclick="askAdmin()" id="nav-admin" class="flex-1 py-4 text-[10px] font-black uppercase text-slate-400 border-b-4 border-transparent tracking-widest">📊 Admin</button>
    </nav>

    <div class="h-20"></div>

    <section id="page-absen" class="max-w-md mx-auto p-6 space-y-6">
        <div class="text-center space-y-4">
            <h1 id="display-nama-pt" class="text-2xl font-black italic text-blue-600 uppercase tracking-tighter">Akrilik Custom Maumbi</h1>
            
            <div id="status-card" class="p-5 rounded-[2rem] bg-white shadow-sm border border-slate-200 transition-all duration-500">
                <p id="st-title" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Menghubungkan Database...</p>
                <p id="st-dist" class="text-[9px] text-slate-400 mt-1 font-medium italic">Sinkronisasi lokasi kantor...</p>
            </div>
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl space-y-6">
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">ID / UUID Karyawan</label>
                <input type="text" id="emp-code" placeholder="Masukkan ID Anda" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-bold text-center text-sm shadow-inner uppercase tracking-wider">
            </div>
            
            <button id="btn-submit" onclick="submitAbsen()" disabled class="btn-disabled w-full py-5 rounded-2xl font-black text-lg uppercase tracking-widest transition-all active:scale-95 shadow-lg">
                Tunggu GPS...
            </button>
            
            <p class="text-[9px] text-center text-slate-400 font-bold uppercase leading-relaxed px-4">
                Sistem hanya akan aktif jika Anda berada di radius kantor yang ditentukan.
            </p>
        </div>
    </section>

    <section id="page-admin" class="hidden max-w-4xl mx-auto p-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col justify-between">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Manajemen Kehadiran</p>
                    <p class="text-[9px] text-slate-400 mb-4 italic">Input Izin, Sakit, atau Cuti secara manual.</p>
                </div>
                <button onclick="inputIzinAdmin()" class="w-full py-4 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-blue-100 active:scale-95 transition-all">
                    ➕ Input Manual / Izin
                </button>
            </div>

            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Laporan Bulanan</p>
                <input type="month" id="rep-mo" class="w-full p-2 border border-slate-100 rounded-lg text-xs outline-none font-bold mb-3 bg-slate-50">
                <button onclick="downloadPDF()" class="w-full py-3 bg-emerald-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-emerald-100 active:scale-95 transition-all">
                    📄 Download PDF
                </button>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-5 border-b bg-slate-50/50 flex justify-between items-center">
                <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">Log Kehadiran Terakhir</span>
                <button onclick="loadData()" class="text-blue-600 text-[9px] font-black uppercase">🔄 Refresh</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <tbody id="log-body" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </section>

    <script>
        // --- CONFIGURATION ---
        const SB_URL = 'https://cvswzigomnpnllsgcqoc.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ';
        
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        let APP_CONFIG = {
            pt: 'Akrilik Custom Maumbi',
            lat: 1.475817,
            lng: 134.922390,
            rad: 50,
            pass: '1234'
        };
        let userPos = null;

        // 1. LOAD SETTINGS FROM DATABASE
        async function loadSettings() {
            const { data, error } = await supabaseClient.from('settings').select('key, value');
            if (!error && data) {
                data.forEach(item => {
                    if(item.key === 'nama_perusahaan') APP_CONFIG.pt = item.value;
                    if(item.key === 'latitude_pusat') APP_CONFIG.lat = parseFloat(item.value);
                    if(item.key === 'longitude_pusat') APP_CONFIG.lng = parseFloat(item.value);
                    if(item.key === 'radius_absen') APP_CONFIG.rad = parseInt(item.value);
                    if(item.key === 'password_admin') APP_CONFIG.pass = item.value;
                });
                document.title = APP_CONFIG.pt;
                document.getElementById('display-nama-pt').innerText = APP_CONFIG.pt;
                startGPS();
            }
        }

        // 2. GPS TRACKING
        function startGPS() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition(pos => {
                userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                const dist = calcDist(userPos.lat, userPos.lng, APP_CONFIG.lat, APP_CONFIG.lng);
                
                const btn = document.getElementById('btn-submit');
                const st = document.getElementById('st-title');
                const card = document.getElementById('status-card');
                
                document.getElementById('st-dist').innerText = `Jarak: ${Math.round(dist)} meter dari kantor`;
                
                if (dist <= APP_CONFIG.rad) {
                    btn.disabled = false; btn.className = "btn-blue w-full py-5 rounded-2xl font-black text-lg uppercase tracking-widest shadow-lg active:scale-95";
                    btn.innerText = "Absen Sekarang";
                    st.innerText = "📍 LOKASI TERVERIFIKASI"; st.className = "text-[10px] font-black text-emerald-500 uppercase tracking-widest";
                    card.classList.add('bg-emerald-50', 'border-emerald-100');
                } else {
                    btn.disabled = true; btn.className = "btn-disabled w-full py-5 rounded-2xl font-black text-lg uppercase tracking-widest";
                    btn.innerText = "Diluar Radius";
                    st.innerText = "DILUAR RADIUS KANTOR"; st.className = "text-[10px] font-black text-red-400 uppercase tracking-widest";
                    card.classList.remove('bg-emerald-50', 'border-emerald-100');
                }
            }, err => {
                document.getElementById('st-title').innerText = "IZIN GPS DITOLAK";
            }, { enableHighAccuracy: true });
        }

        // 3. ACTIONS & SUBMISSION
        async function submitAbsen() {
            const id = document.getElementById('emp-code').value.trim();
            if(!id) return Swal.fire('ID Kosong', 'Masukkan UUID karyawan.', 'warning');
            
            Swal.fire({ title: 'Memverifikasi...', didOpen: () => Swal.showLoading() });
            
            const { data: p } = await supabaseClient.from('pegawai').select('nama').eq('id', id).single();
            if(!p) return Swal.fire('Gagal', 'ID tidak terdaftar di sistem.', 'error');

            const { error } = await supabaseClient.from('attendance').insert([{ 
                employee_code: id, lat: userPos.lat, lng: userPos.lng, is_on_site: true, status: 'Hadir' 
            }]);
            
            if(!error) {
                Swal.fire({ icon: 'success', title: 'Berhasil', text: `Halo ${p.nama}, absensi hari ini tercatat.`, showConfirmButton: false, timer: 3000 });
                localStorage.setItem('karyawan_id', id);
            } else {
                Swal.fire('Error', error.message, 'error');
            }
        }

        // 4. ADMIN PANEL FUNCTIONS
        async function askAdmin() {
            const { value: p } = await Swal.fire({ title: 'Dashboard Admin', input: 'password', inputPlaceholder: 'Masukkan Password', showCancelButton: true });
            if (p === APP_CONFIG.pass) renderPage('admin');
            else if(p) Swal.fire('Akses Ditolak', 'Password salah.', 'error');
        }

        async function inputIzinAdmin() {
            const { value: id } = await Swal.fire({ title: 'Input Manual', input: 'text', inputLabel: 'ID / UUID Karyawan', showCancelButton: true });
            if (!id) return;

            const { value: status } = await Swal.fire({
                title: 'Pilih Status',
                input: 'select',
                inputOptions: { 'Hadir': 'Hadir (Manual)', 'Sakit': 'Sakit', 'Izin': 'Izin', 'Cuti': 'Cuti' },
                showCancelButton: true
            });

            if (status) {
                const { error } = await supabaseClient.from('attendance').insert([{ employee_code: id, is_on_site: true, status: status }]);
                if(!error) { Swal.fire('Berhasil', 'Data manual telah disimpan.', 'success'); loadData(); }
            }
        }

        function renderPage(p) {
            document.getElementById('page-absen').classList.toggle('hidden', p !== 'absen');
            document.getElementById('page-admin').classList.toggle('hidden', p !== 'admin');
            document.getElementById('nav-absen').className = `flex-1 py-4 text-[10px] font-black uppercase ${p==='absen'?'nav-active':'text-slate-400'}`;
            document.getElementById('nav-admin').className = `flex-1 py-4 text-[10px] font-black uppercase ${p==='admin'?'nav-active':'text-slate-400'}`;
            if(p === 'admin') loadData();
        }

        async function loadData() {
            const { data } = await supabaseClient.from('attendance').select('*').order('check_in', { ascending: false }).limit(20);
            if(data) {
                document.getElementById('log-body').innerHTML = data.map(d => `
                    <tr>
                        <td class="p-4 font-black text-[10px] uppercase text-slate-600">${d.employee_code.substring(0,8)}...</td>
                        <td class="p-4"><span class="px-2 py-1 rounded-full text-[8px] font-black uppercase ${d.status === 'Hadir' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">${d.status || 'Hadir'}</span></td>
                        <td class="p-4 text-right text-[10px] text-slate-400 font-bold">${new Date(d.check_in).toLocaleTimeString('id-ID')}</td>
                    </tr>
                `).join('');
            }
        }

        async function downloadPDF() {
            const mo = document.getElementById('rep-mo').value;
            const { data } = await supabaseClient.from('attendance').select('*').gte('date', `${mo}-01`).lte('date', `${mo}-31`);
            if(!data || data.length === 0) return Swal.fire('Data Kosong', 'Tidak ada riwayat pada bulan ini.', 'info');
            
            const doc = new jspdf.jsPDF();
            doc.setFontSize(16); doc.text(`LAPORAN ABSENSI - ${APP_CONFIG.pt}`, 14, 15);
            doc.setFontSize(10); doc.text(`Bulan: ${mo}`, 14, 22);
            doc.autoTable({
                startY: 30,
                head: [['No', 'ID Karyawan', 'Tanggal', 'Status']],
                body: data.map((d, i) => [i+1, d.employee_code, d.date, d.status || 'Hadir']),
                headStyles: { fillColor: [37, 99, 235] }
            });
            doc.save(`Absensi_${APP_CONFIG.pt}_${mo}.pdf`);
        }

        // --- HELPERS ---
        function calcDist(l1, n1, l2, n2) {
            const R = 6371e3; const dL = (l2-l1)*Math.PI/180; const dN = (n2-n1)*Math.PI/180;
            const a = Math.sin(dL/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180) * Math.sin(dN/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        window.onload = () => {
            const saved = localStorage.getItem('karyawan_id');
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.get('id')) document.getElementById('emp-code').value = urlParams.get('id');
            else if(saved) document.getElementById('emp-code').value = saved;
            loadSettings();
        };
    </script>
</body>
</html>
