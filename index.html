<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Maumbi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #4facfe; --secondary: #00f2fe; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app-card { width: 90%; max-width: 380px; background: white; border-radius: 30px; padding: 30px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        .fingerprint-btn {
            width: 130px; height: 130px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: 8px solid #e0f7ff; display: flex; align-items: center; justify-content: center;
            margin: 20px auto; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 8px 20px rgba(79, 172, 254, 0.4);
            color: white; font-size: 55px;
        }
        .fingerprint-btn:active { transform: scale(0.9); }
        .fingerprint-btn.disabled { background: #d1d1d1; border-color: #eee; cursor: not-allowed; box-shadow: none; }
        
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; text-align: center; margin-bottom: 15px; font-size: 1rem; }
        .mode-switch { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; background: #f8f9fa; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .mode-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        #locInfo { font-size: 0.85rem; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="app-card">
    <h3 style="margin-bottom: 5px;">Maumbi Absensi</h3>
    <div id="locInfo" style="background: #fdfdfd; color: #888;">Mencari lokasi...</div>

    <input type="text" id="empCode" placeholder="Masukkan UUID Anda">

    <div class="mode-switch">
        <button id="modeMasuk" class="mode-btn active" onclick="setMode('masuk')">MASUK</button>
        <button id="modePulang" class="mode-btn" onclick="setMode('pulang')">PULANG</button>
    </div>

    <div id="btnAbsen" class="fingerprint-btn disabled" onclick="prosesAbsen()">
        <i class="fa-solid fa-fingerprint"></i>
    </div>
    
    <p id="statusLabel" style="font-weight:bold; color:#555;">Tunggu Lokasi...</p>
</div>

<script>
    // --- KONFIGURASI SUPABASE ---
    const SB_URL = "https://cvswzigomnpnllsgcqoc.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ";
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    // Titik Koordinat Maumbi (Contoh: -1.234, 123.456)
    const KANTOR_LAT = 1.475817; // Ganti dengan Latitude kantor Anda
    const KANTOR_LNG = 124.932390; // Ganti dengan Longitude kantor Anda
    const RADIUS_MAKS = 50; // Meter

    let mode = 'masuk';
    let userInside = false;

    function setMode(m) {
        mode = m;
        document.getElementById('modeMasuk').classList.toggle('active', m === 'masuk');
        document.getElementById('modePulang').classList.toggle('active', m === 'pulang');
        updateUI();
    }

    // LOGIKA HITUNG JARAK (HAVERSINE)
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; // Radius bumi dalam meter
        const φ1 = lat1 * Math.PI/180;
        const φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180;
        const Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    // NAVIGATOR GEOLOCATION
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            const dist = getDistance(pos.coords.latitude, pos.coords.longitude, KANTOR_LAT, KANTOR_LNG);
            const info = document.getElementById('locInfo');
            
            if (dist <= RADIUS_MAKS) {
                info.innerHTML = `<b style="color:green">📍 Di Lokasi (${Math.round(dist)}m)</b>`;
                userInside = true;
            } else {
                info.innerHTML = `<b style="color:red">📍 Luar Radius (${Math.round(dist)}m)</b>`;
                userInside = false;
            }
            updateUI();
        }, err => {
            document.getElementById('locInfo').innerText = "Aktifkan GPS HP Anda!";
        }, { enableHighAccuracy: true });
    }

    function updateUI() {
        const btn = document.getElementById('btnAbsen');
        const label = document.getElementById('statusLabel');
        if (userInside) {
            btn.classList.remove('disabled');
            label.innerText = mode === 'masuk' ? 'Ketuk Sidik Jari (Masuk)' : 'Ketuk Sidik Jari (Pulang)';
        } else {
            btn.classList.add('disabled');
            label.innerText = 'Dekati Lokasi Kantor';
        }
    }

    async function prosesAbsen() {
        if (!userInside) return;
        const code = document.getElementById('empCode').value;
        if (!code) return Swal.fire("Peringatan", "UUID harus diisi!", "warning");

        Swal.fire({ title: 'Memproses...', didOpen: () => { Swal.showLoading(); }});

        if (mode === 'masuk') {
            const { error } = await supabase.from('attendance').insert([
                { employee_code: code, status: 'Hadir', is_on_site: true, check_in: new Date() }
            ]);
            responAbsen(error, "Absen Masuk Berhasil!");
        } else {
            const { error } = await supabase.from('attendance')
                .update({ check_out: new Date() })
                .eq('employee_code', code)
                .is('check_out', null);
            responAbsen(error, "Absen Pulang Berhasil!");
        }
    }

    function responAbsen(error, msg) {
        if (error) Swal.fire("Gagal", "Error: " + error.message, "error");
        else Swal.fire("Sukses", msg, "success");
    }
</script>
</body>
</html>
