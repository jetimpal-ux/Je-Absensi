<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium QR Attendance + Geofencing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; }
        #reader { width: 100% !important; border: none !important; }
        #reader__dashboard { display: none !important; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900 min-h-screen">

    <nav class="sticky top-0 z-50 bg-white border-b border-slate-200">
        <div class="max-w-6xl mx-auto flex justify-around p-1">
            <button onclick="showPage('scan')" id="btn-scan" class="flex-1 py-4 font-bold text-slate-500 tab-active">
                📸 SCAN MASUK
            </button>
            <button onclick="showPage('admin')" id="btn-admin" class="flex-1 py-4 font-bold text-slate-500">
                📊 DASHBOARD ADMIN
            </button>
        </div>
    </nav>

    <main id="page-scan" class="max-w-md mx-auto p-4 space-y-4">
        <div class="text-center py-4">
            <h1 class="text-2xl font-black text-slate-800">QR ABSENSI</h1>
            <p id="geo-status" class="text-xs font-bold text-amber-600 animate-pulse">🛰️ Menunggu Sinyal GPS...</p>
        </div>
        
        <div class="relative overflow-hidden rounded-3xl shadow-2xl bg-black border-4 border-white">
            <div id="reader"></div>
        </div>

        <div class="glass p-6 rounded-3xl border border-white shadow-xl">
            <h3 class="font-bold mb-4 text-sm uppercase tracking-widest text-slate-400 text-center">Form Izin Cepat</h3>
            <input type="text" id="izin-code" placeholder="ID Karyawan" class="w-full mb-3 p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
            <textarea id="izin-reason" placeholder="Alasan Izin..." class="w-full mb-3 p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            <button onclick="submitIzin()" class="w-full bg-slate-800 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">KIRIM IZIN</button>
        </div>
    </main>

    <main id="page-admin" class="hidden max-w-6xl mx-auto p-4 space-y-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-xs text-slate-400 font-bold uppercase">Hadir Hari Ini</p>
                <h2 id="stat-present" class="text-2xl font-black">0</h2>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-xs text-slate-400 font-bold uppercase">Izin Pending</p>
                <h2 id="stat-leave" class="text-2xl font-black text-amber-500">0</h2>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h3 class="font-bold mb-4">Grafik Kehadiran 7 Hari Terakhir</h3>
            <canvas id="attendanceChart" height="150"></canvas>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center bg-slate-50">
                <h3 class="font-bold">Log Absensi Terbaru</h3>
                <button onclick="exportToPDF()" class="text-xs bg-blue-600 text-white px-3 py-1 rounded-full font-bold">PDF REKAP</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="text-slate-400 uppercase text-[10px] tracking-widest">
                            <th class="p-4">Karyawan</th>
                            <th class="p-4">Waktu</th>
                            <th class="p-4 text-center">Status Jarak</th>
                            <th class="p-4 text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="attendance-list" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // KONFIGURASI
        const SUPABASE_URL = 'https://cvswzigomnpnllsgcqoc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ';
        const OFFICE_COORDS = { lat: 1.429042, lng: 125.122123 }; // GANTI KOORDINAT ANDA
        const MAX_DISTANCE = 50; // Jarak maksimum dalam meter

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let userLocation = null;

        // TRACK LOKASI REALTIME
        navigator.geolocation.watchPosition((pos) => {
            userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            document.getElementById('geo-status').innerText = '🛰️ GPS Aktif: ' + userLocation.lat.toFixed(4) + ', ' + userLocation.lng.toFixed(4);
            document.getElementById('geo-status').classList.replace('text-amber-600', 'text-emerald-600');
        }, (err) => {
            document.getElementById('geo-status').innerText = '❌ Aktifkan GPS untuk Absen!';
        }, { enableHighAccuracy: true });

        // LOGIKA HITUNG JARAK (GEOFENCING)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // metres
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // SCANNER QR
        function onScanSuccess(decodedText) {
            if (!userLocation) return alert("Sinyal GPS belum ditemukan!");
            
            const distance = calculateDistance(userLocation.lat, userLocation.lng, OFFICE_COORDS.lat, OFFICE_COORDS.lng);
            
            if (distance > MAX_DISTANCE) {
                alert(`Gagal Absen! Anda berada ${Math.round(distance)}m dari kantor (Batas: ${MAX_DISTANCE}m)`);
                return;
            }

            // Kirim ke Supabase
            submitToSupabase(decodedText);
        }

        async function submitToSupabase(code) {
            const { error } = await supabase.from('attendance').insert([
                { employee_code: code, lat: userLocation.lat, lng: userLocation.lng, is_on_site: true }
            ]);
            if (!error) {
                alert("Absen Berhasil!");
                location.reload();
            } else {
                alert("Error: " + error.message);
            }
        }

        const scanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 200 });
        scanner.render(onScanSuccess);

        // NAVIGASI & ADMIN LOGIC
        function showPage(page) {
            document.getElementById('page-scan').classList.toggle('hidden', page !== 'scan');
            document.getElementById('page-admin').classList.toggle('hidden', page !== 'admin');
            document.getElementById('btn-scan').classList.toggle('tab-active', page === 'scan');
            document.getElementById('btn-admin').classList.toggle('tab-active', page === 'admin');
            if(page === 'admin') {
                loadAdminStats();
                initChart();
            }
        }

        async function loadAdminStats() {
            const { data } = await supabase.from('attendance').select('*').order('check_in', { ascending: false });
            document.getElementById('stat-present').innerText = data.length;
            
            const list = document.getElementById('attendance-list');
            list.innerHTML = data.map(item => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="p-4 font-bold text-slate-700">${item.employee_code}</td>
                    <td class="p-4 text-slate-500">${new Date(item.check_in).toLocaleTimeString()}</td>
                    <td class="p-4 text-center">
                        <span class="px-2 py-1 rounded-full text-[10px] font-bold ${item.is_on_site ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}">
                            ${item.is_on_site ? 'DALAM RADIUS' : 'LUAR AREA'}
                        </span>
                    </td>
                    <td class="p-4 text-right">
                        <button class="text-blue-500 font-bold">Edit</button>
                    </td>
                </tr>
            `).join('');
        }

        function initChart() {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'],
                    datasets: [{
                        label: 'Hadir',
                        data: [12, 19, 3, 5, 2, 3, 7],
                        borderColor: '#2563eb',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(37, 99, 235, 0.05)'
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }
    </script>
</body>
</html>
