<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akrilik Custom Maumbi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; touch-action: manipulation; }
        .nav-active { color: #2563eb; border-bottom: 4px solid #2563eb; font-weight: 800; }
        /* Style tombol manual agar pasti menyala */
        .btn-nyala { background-color: #2563eb !important; color: white !important; cursor: pointer !important; pointer-events: auto !important; opacity: 1 !important; }
        .btn-mati { background-color: #e2e8f0 !important; color: #94a3b8 !important; cursor: not-allowed !important; pointer-events: none !important; opacity: 0.6 !important; }
    </style>
</head>
<body class="pb-10">

    <nav class="fixed top-0 left-0 right-0 z-[999] bg-white border-b shadow-sm flex text-center">
        <button onclick="renderPage('absen')" id="nav-absen" class="flex-1 py-4 text-[10px] font-black uppercase nav-active">📲 Absen</button>
        <button onclick="askAdmin()" id="nav-admin" class="flex-1 py-4 text-[10px] font-black uppercase text-slate-400 border-b-4 border-transparent">📊 Admin</button>
    </nav>

    <div class="h-20"></div>

    <section id="page-absen" class="max-w-md mx-auto p-6 space-y-6">
        <div class="text-center space-y-4">
            <h1 id="display-nama-pt" class="text-2xl font-black italic text-blue-600 uppercase italic">Akrilik Custom Maumbi</h1>
            <div id="status-card" class="p-5 rounded-[2rem] bg-white shadow-sm border border-slate-200">
                <p id="st-title" class="text-[10px] font-black text-slate-400 uppercase">Menghitung Lokasi...</p>
                <p id="st-dist" class="text-[9px] text-slate-400 mt-1 font-medium italic italic">Pastikan GPS Aktif</p>
            </div>
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl space-y-6">
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2">ID Karyawan (UUID)</label>
                <input type="text" id="emp-code" placeholder="Tempel ID Di Sini" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-center text-sm shadow-inner uppercase">
            </div>
            
            <button id="btn-submit" onclick="submitAbsen()" class="btn-mati w-full py-5 rounded-2xl font-black text-lg uppercase shadow-lg transition-all active:scale-95">
                Tunggu GPS...
            </button>
        </div>
    </section>

    <section id="page-admin" class="hidden max-w-4xl mx-auto p-6 space-y-6">
        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex justify-between items-center">
            <button onclick="inputIzinAdmin()" class="py-3 px-5 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest">➕ Input Izin</button>
            <button onclick="downloadPDF()" class="py-3 px-5 bg-emerald-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest">📄 Download PDF</button>
        </div>
        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left text-sm">
                <tbody id="log-body" class="divide-y divide-slate-50"></tbody>
            </table>
        </div>
    </section>

    <script>
        // --- ISI KREDENSIAL ANDA DI SINI ---
        const SB_URL = 'https://cvswzigomnpnllsgcqoc.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ';
        
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let APP_CONFIG = { pt: 'Akrilik Custom Maumbi', lat: 1.475817, lng: 124.923390, rad: 50, pass: '1234' };
        let userPos = null;

        // 1. AMBIL SETTING DARI DATABASE
        async function loadSettings() {
            const { data } = await supabaseClient.from('settings').select('*');
            if (data) {
                data.forEach(item => {
                    const v = item.value.trim();
                    if(item.key === 'nama_perusahaan') APP_CONFIG.pt = v;
                    if(item.key === 'latitude_pusat') APP_CONFIG.lat = parseFloat(v);
                    if(item.key === 'longitude_pusat') APP_CONFIG.lng = parseFloat(v);
                    if(item.key === 'radius_absen') APP_CONFIG.rad = parseInt(v);
                    if(item.key === 'password_admin') APP_CONFIG.pass = v;
                });
                document.getElementById('display-nama-pt').innerText = APP_CONFIG.pt;
                startGPS();
            }
        }

        // 2. RUMUS JARAK AKURAT
        function calcDist(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // 3. MONITOR GPS & AKTIFKAN TOMBOL
        function startGPS() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition(pos => {
                userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                const dist = calcDist(userPos.lat, userPos.lng, APP_CONFIG.lat, APP_CONFIG.lng);
                
                const btn = document.getElementById('btn-submit');
                const st = document.getElementById('st-title');
                document.getElementById('st-dist').innerText = `Jarak: ${Math.round(dist)} meter dari kantor`;
                
                if (dist <= APP_CONFIG.rad) {
                    btn.className = "w-full py-5 rounded-2xl font-black text-lg uppercase shadow-lg transition-all active:scale-95 btn-nyala";
                    btn.innerText = "Absen Sekarang";
                    st.innerText = "📍 LOKASI TERVERIFIKASI";
                    st.className = "text-[10px] font-black text-emerald-500 uppercase tracking-widest";
                } else {
                    btn.className = "w-full py-5 rounded-2xl font-black text-lg uppercase shadow-lg btn-mati";
                    btn.innerText = "Diluar Radius";
                    st.innerText = "DILUAR RADIUS KANTOR";
                    st.className = "text-[10px] font-black text-red-400 uppercase tracking-widest";
                }
            }, null, { enableHighAccuracy: true, maximumAge: 0 });
        }

        // 4. PROSES ABSEN
        async function submitAbsen() {
            const id = document.getElementById('emp-code').value.trim();
            if(!id) return Swal.fire('Error', 'ID Kosong!', 'error');

            Swal.fire({ title: 'Proses...', didOpen: () => Swal.showLoading() });

            // Cek Karyawan
            const { data: p } = await supabaseClient.from('pegawai').select('nama').eq('id', id).single();
            if(!p) return Swal.fire('Gagal', 'ID tidak terdaftar!', 'error');

            // Simpan Absen
            const { error } = await supabaseClient.from('attendance').insert([{ 
                employee_code: id, lat: userPos.lat, lng: userPos.lng, is_on_site: true, status: 'Hadir' 
            }]);
            
            if(!error) {
                Swal.fire('Berhasil', `Halo ${p.nama}, absen tercatat.`, 'success');
                localStorage.setItem('karyawan_id', id);
            } else {
                Swal.fire('Gagal Simpan', error.message, 'error');
            }
        }

        // 5. ADMIN & LAINNYA
        async function askAdmin() {
            const { value: p } = await Swal.fire({ title: 'Akses Admin', input: 'password', showCancelButton: true });
            if (p === APP_CONFIG.pass) renderPage('admin');
        }

        function renderPage(p) {
            document.getElementById('page-absen').classList.toggle('hidden', p !== 'absen');
            document.getElementById('page-admin').classList.toggle('hidden', p !== 'admin');
            if(p === 'admin') loadData();
        }

        async function loadData() {
            const { data } = await supabaseClient.from('attendance').select('*').order('check_in', { ascending: false }).limit(10);
            if(data) {
                document.getElementById('log-body').innerHTML = data.map(d => `
                    <tr>
                        <td class="p-4 font-black text-[10px] uppercase text-slate-600">${d.employee_code.substring(0,8)}...</td>
                        <td class="p-4"><span class="px-2 py-1 rounded-full text-[8px] font-black uppercase ${d.status === 'Hadir' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">${d.status || 'Hadir'}</span></td>
                        <td class="p-4 text-right text-[10px] text-slate-400 font-bold">${new Date(d.check_in).toLocaleTimeString('id-ID')}</td>
                    </tr>
                `).join('');
            }
        }

        async function inputIzinAdmin() {
            const { value: id } = await Swal.fire({ title: 'Input ID Karyawan', input: 'text', showCancelButton: true });
            if (!id) return;
            const { value: st } = await Swal.fire({
                title: 'Status',
                input: 'select',
                inputOptions: { 'Hadir': 'Hadir (Manual)', 'Sakit': 'Sakit', 'Izin': 'Izin', 'Cuti': 'Cuti' }
            });
            if (st) {
                await supabaseClient.from('attendance').insert([{ employee_code: id, is_on_site: true, status: st }]);
                Swal.fire('Sukses', 'Data disimpan', 'success');
                loadData();
            }
        }

        async function downloadPDF() {
            const mo = document.getElementById('rep-mo').value;
            const { data } = await supabaseClient.from('attendance').select('*').gte('date', `${mo}-01`).lte('date', `${mo}-31`);
            const doc = new jspdf.jsPDF();
            doc.text(`LAPORAN - ${APP_CONFIG.pt}`, 14, 20);
            doc.autoTable({ startY: 25, head: [['No', 'ID', 'Tanggal', 'Status']], body: data.map((d, i) => [i+1, d.employee_code.substring(0,8), d.date, d.status]) });
            doc.save(`Absen_${mo}.pdf`);
        }

        window.onload = () => {
            const saved = localStorage.getItem('karyawan_id');
            if(saved) document.getElementById('emp-code').value = saved;
            loadSettings();
        };
    </script>
</body>
</html>
