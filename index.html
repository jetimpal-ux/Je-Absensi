<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi draft - Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .nav-active { color: #2563eb; border-bottom: 4px solid #2563eb; font-weight: 800; }
        .glass-card { background: rgba(255, 255, 255, 0.9); border: 1px solid white; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pb-10">

    <nav class="fixed top-0 left-0 right-0 z-[999] bg-white border-b shadow-sm flex">
        <button onclick="renderPage('absen')" id="nav-absen" class="flex-1 py-4 text-[10px] font-black uppercase nav-active tracking-widest">📲 Absen</button>
        <button onclick="askAdmin()" id="nav-admin" class="flex-1 py-4 text-[10px] font-black uppercase text-slate-400 border-b-4 border-transparent tracking-widest">📊 Admin</button>
    </nav>

    <div class="h-20"></div>

    <section id="page-absen" class="max-w-md mx-auto p-6 space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-black italic text-blue-600">ABSENSI-KARYAWAN</h1>
            <div id="gps-card" class="mt-4 p-4 bg-white rounded-2xl border border-slate-200 shadow-sm">
                <p id="st-title" class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Mencari GPS...</p>
                <p id="st-dist" class="text-[9px] text-slate-400 mt-1 italic text-center">Izin lokasi diperlukan</p>
            </div>
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl space-y-5">
            <input type="text" id="emp-code" placeholder="Tempel ID / UUID Anda" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-bold text-center text-sm shadow-inner uppercase">
            <button id="btn-submit" onclick="submitAbsen()" disabled class="bg-slate-200 text-slate-400 cursor-not-allowed w-full py-5 rounded-2xl font-black text-lg uppercase shadow-lg transition-all active:scale-95">
                Absen Sekarang
            </button>
        </div>
    </section>

    <section id="page-admin" class="hidden max-w-4xl mx-auto p-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col justify-between">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Input Kehadiran & Izin</p>
                    <p class="text-[9px] text-slate-400 mb-3 italic">Gunakan ini untuk input Sakit/Izin/Cuti</p>
                </div>
                <button onclick="inputKehadiranAdmin()" class="w-full py-4 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-blue-200">
                    ➕ Input Manual / Izin
                </button>
            </div>
            
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Laporan Bulanan</p>
                <input type="month" id="rep-mo" class="w-full p-2 border rounded-lg text-xs outline-none font-bold mb-2">
                <button onclick="downloadLaporan()" class="w-full py-2 bg-emerald-600 text-white rounded-lg text-[10px] font-black uppercase">Download PDF</button>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                    <tr><th class="p-4">Karyawan</th><th class="p-4">Status</th><th class="p-4 text-right">Jam</th></tr>
                </thead>
                <tbody id="log-body" class="divide-y divide-slate-50"></tbody>
            </table>
        </div>
    </section>

    <script>
        // KONFIGURASI SUPABASE (Isi dengan milik Anda)
        const SB_URL = 'https://cvswzigomnpnllsgcqoc.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ';
        const GUDANG = { lat: 1.429042, lng: 125.122123 }; 
        const JARAK_MAX = 50;

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let userPos = null;

        // FUNGSI UTAMA ADMIN UNTUK INPUT IZIN
        async function inputKehadiranAdmin() {
            // 1. Minta ID Karyawan
            const { value: idKaryawan } = await Swal.fire({
                title: 'Input Data Karyawan',
                input: 'text',
                inputLabel: 'Masukkan UUID dari tabel pegawai',
                showCancelButton: true,
                inputValidator: (v) => !v && 'ID wajib diisi!'
            });

            if (!idKaryawan) return;

            // 2. Pilih Status
            const { value: statusDipilih } = await Swal.fire({
                title: 'Pilih Status Kehadiran',
                input: 'select',
                inputOptions: {
                    'Hadir': 'Hadir (Manual)',
                    'Sakit': 'Sakit',
                    'Izin': 'Izin',
                    'Cuti': 'Cuti'
                },
                inputPlaceholder: 'Pilih status',
                showCancelButton: true
            });

            if (statusDipilih) {
                Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading() });
                
                // Simpan ke tabel attendance
                const { error } = await supabaseClient.from('attendance').insert([{ 
                    employee_code: idKaryawan, 
                    is_on_site: true,
                    status: statusDipilih // Pastikan kolom 'status' ada di Supabase
                }]);

                if (!error) {
                    Swal.fire('Berhasil!', `Data ${statusDipilih} telah dicatat.`, 'success');
                    loadData();
                } else {
                    Swal.fire('Gagal', 'Pastikan kolom status ada di tabel attendance', 'error');
                }
            }
        }

        // --- SISTEM GPS ---
        function startGPS() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition(pos => {
                userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                const d = calcDist(userPos.lat, userPos.lng, GUDANG.lat, GUDANG.lng);
                document.getElementById('st-dist').innerText = `Jarak: ${Math.round(d)} meter dari lokasi`;
                const btn = document.getElementById('btn-submit');
                const st = document.getElementById('st-title');
                if (d <= JARAK_MAX) {
                    btn.disabled = false; btn.className = "bg-blue-600 text-white w-full py-5 rounded-2xl font-black text-lg uppercase shadow-lg";
                    st.innerText = "📍 LOKASI TERVERIFIKASI"; st.className = "text-[10px] font-black text-emerald-500 uppercase tracking-widest text-center";
                } else {
                    btn.disabled = true; btn.className = "bg-slate-200 text-slate-400 w-full py-5 rounded-2xl font-black text-lg uppercase";
                    st.innerText = "DILUAR RADIUS KANTOR"; st.className = "text-[10px] font-black text-red-400 uppercase tracking-widest text-center";
                }
            }, null, { enableHighAccuracy: true });
        }

        async function askAdmin() {
            const { value: p } = await Swal.fire({ title: 'Password Admin', input: 'password', showCancelButton: true });
            if (p === '1234') renderPage('admin');
        }

        function renderPage(p) {
            document.getElementById('page-absen').classList.toggle('hidden', p !== 'absen');
            document.getElementById('page-admin').classList.toggle('hidden', p !== 'admin');
            document.getElementById('nav-absen').className = `flex-1 py-4 text-[10px] font-black uppercase ${p==='absen'?'nav-active':'text-slate-400'}`;
            document.getElementById('nav-admin').className = `flex-1 py-4 text-[10px] font-black uppercase ${p==='admin'?'nav-active':'text-slate-400'}`;
            if(p === 'admin') loadData();
        }

        async function submitAbsen() {
            const id = document.getElementById('emp-code').value.trim();
            const { data: p } = await supabaseClient.from('pegawai').select('nama').eq('id', id).single();
            if(!p) return Swal.fire('Error', 'ID tidak ditemukan', 'error');

            const { error } = await supabaseClient.from('attendance').insert([{ 
                employee_code: id, lat: userPos.lat, lng: userPos.lng, is_on_site: true, status: 'Hadir' 
            }]);
            if(!error) {
                Swal.fire('Berhasil!', `Halo ${p.nama}, absen dicatat.`, 'success');
                localStorage.setItem('karyawan_id', id);
            }
        }

        async function loadData() {
            const { data } = await supabaseClient.from('attendance').select('*').order('check_in', { ascending: false }).limit(20);
            if(data) {
                document.getElementById('log-body').innerHTML = data.map(d => `
                    <tr>
                        <td class="p-4 font-black text-[10px] uppercase">${d.employee_code.substring(0,8)}...</td>
                        <td class="p-4"><span class="px-2 py-1 rounded-full text-[9px] font-black uppercase ${d.status === 'Hadir' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">${d.status || 'Hadir'}</span></td>
                        <td class="p-4 text-right text-[10px] text-slate-400 font-bold">${new Date(d.check_in).toLocaleTimeString('id-ID')}</td>
                    </tr>
                `).join('');
            }
        }

        function calcDist(l1, n1, l2, n2) {
            const R = 6371e3; const dL = (l2-l1)*Math.PI/180; const dN = (n2-n1)*Math.PI/180;
            const a = Math.sin(dL/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180) * Math.sin(dN/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        window.onload = () => {
            const saved = localStorage.getItem('karyawan_id');
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.get('id')) document.getElementById('emp-code').value = urlParams.get('id');
            else if(saved) document.getElementById('emp-code').value = saved;
            startGPS();
        };
    </script>
</body>
</html>
