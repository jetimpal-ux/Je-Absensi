<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Maumbi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #4facfe; --secondary: #00f2fe; }
        body { background: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app-card { width: 90%; max-width: 380px; background: white; border-radius: 30px; padding: 25px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .fingerprint-btn {
            width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: 8px solid #e0f7ff; display: flex; align-items: center; justify-content: center;
            margin: 20px auto; cursor: pointer; transition: 0.3s; color: white; font-size: 50px;
        }
        .disabled { background: #ccc !important; border-color: #eee !important; cursor: not-allowed; opacity: 0.6; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; text-align: center; margin-bottom: 15px; }
        .mode-switch { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; background: #f8f9fa; font-weight: bold; }
        .active { background: var(--primary) !important; color: white !important; }
    </style>
</head>
<body>

<div class="app-card">
    <h3>Maumbi Absensi</h3>
    <div id="locInfo" style="padding: 10px; font-weight: bold; color: orange;">🛰️ Menunggu GPS...</div>

    <input type="text" id="empCode" placeholder="Masukkan UUID">

    <div class="mode-switch">
        <button id="mIn" class="mode-btn active" onclick="setMode('masuk')">MASUK</button>
        <button id="mOut" class="mode-btn" onclick="setMode('pulang')">PULANG</button>
    </div>

    <div id="btnAbsen" class="fingerprint-btn disabled" onclick="prosesAbsen()">
        <i class="fa-solid fa-fingerprint"></i>
    </div>
    
    <p id="statusLabel">Pastikan GPS Aktif</p>
</div>

<script>
    // --- 1. SETUP DATABASE ---
    const SB_URL = "https://cvswzigomnpnllsgcqoc.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ";
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    // --- 2. KOORDINAT KANTOR (Sesuaikan Lat & Lng Maumbi) ---
    const K_LAT = 1.475817; 
    const K_LNG = 124.922390; 
    const RADIUS = 100; 

    let currentMode = 'masuk';
    let isReady = false;

    function setMode(m) {
        currentMode = m;
        document.getElementById('mIn').classList.toggle('active', m === 'masuk');
        document.getElementById('mOut').classList.toggle('active', m === 'pulang');
        console.log("Mode diubah ke: " + m);
    }

    // --- 3. LOGIKA JARAK ---
    function getDist(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // --- 4. GPS LANGSUNG JALAN (REVISI) ---
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
            (pos) => {
                const dist = getDist(pos.coords.latitude, pos.coords.longitude, K_LAT, K_LNG);
                const info = document.getElementById('locInfo');
                const btn = document.getElementById('btnAbsen');
                
                if (dist <= RADIUS) {
                    info.innerHTML = `<span style="color:green">✅ Di Lokasi (${Math.round(dist)}m)</span>`;
                    btn.classList.remove('disabled');
                    isReady = true;
                } else {
                    info.innerHTML = `<span style="color:red">📍 Luar Radius (${Math.round(dist)}m)</span>`;
                    btn.classList.add('disabled');
                    isReady = false;
                }
            },
            (err) => {
                document.getElementById('locInfo').innerHTML = `<span style="color:red">GPS Error: ${err.message}</span>`;
            },
            { enableHighAccuracy: true, maximumAge: 0 }
        );
    }

    // --- 5. PROSES ABSEN ---
    async function prosesAbsen() {
        if (!isReady) return;
        const code = document.getElementById('empCode').value;
        if (!code) return Swal.fire("Isi UUID", "", "warning");

        Swal.fire({title: 'Memproses...', didOpen: () => { Swal.showLoading(); }});

        try {
            if (currentMode === 'masuk') {
                const { error } = await supabase.from('attendance').insert([
                    { employee_code: code, status: 'Hadir', is_on_site: true, check_in: new Date() }
                ]);
                if (error) throw error;
                Swal.fire("Berhasil", "Selamat Bekerja!", "success");
            } else {
                const { error } = await supabase.from('attendance')
                    .update({ check_out: new Date() })
                    .eq('employee_code', code)
                    .is('check_out', null);
                if (error) throw error;
                Swal.fire("Berhasil", "Hati-hati di jalan!", "success");
            }
        } catch (e) {
            Swal.fire("Gagal", e.message, "error");
        }
    }
</script>
</body>
</html>
