<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Absensi - Smart Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .btn-blue { background: #2563eb; color: white; font-weight: 800; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
        .btn-disabled { background: #cbd5e1 !important; cursor: not-allowed; color: #64748b !important; }
        .nav-active { color: #2563eb; border-bottom: 4px solid #2563eb; font-weight: 800; }
        .glass-card { background: rgba(255, 255, 255, 0.9); border: 1px solid white; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <nav class="fixed top-0 left-0 right-0 z-[999] bg-white border-b shadow-sm">
        <div class="max-w-6xl mx-auto flex">
            <button onclick="showPage('absen')" id="nav-absen" class="flex-1 py-5 text-[10px] uppercase tracking-widest nav-active">📲 Absen</button>
            <button onclick="showPage('admin')" id="nav-admin" class="flex-1 py-5 text-[10px] uppercase tracking-widest text-slate-400">📊 Admin</button>
        </div>
    </nav>

    <div class="h-24"></div>

    <section id="page-absen" class="max-w-md mx-auto p-6 space-y-6">
        <div class="text-center space-y-4">
            <h1 class="text-3xl font-black italic text-blue-600 tracking-tighter uppercase">demo-absensi</h1>
            
            <div id="status-card" class="p-5 rounded-[2rem] bg-white shadow-sm border border-slate-200 transition-all duration-500">
                <p id="status-title" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Mencari Lokasi...</p>
                <p id="status-desc" class="text-[9px] text-slate-400 mt-1 font-medium italic italic">Menginisialisasi GPS...</p>
            </div>
        </div>

        <div class="glass-card p-8 rounded-[2.5rem] shadow-xl space-y-6">
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">ID / UUID Karyawan</label>
                <input type="text" id="emp-code" placeholder="Masukkan ID Anda" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-bold text-center text-sm shadow-inner transition-all">
            </div>
            
            <button id="main-btn" onclick="submitAbsen()" disabled class="btn-disabled w-full py-5 rounded-2xl font-black text-lg uppercase tracking-widest transition-all active:scale-95 shadow-lg">
                Absen Sekarang
            </button>
            
            <p class="text-[9px] text-center text-slate-400 font-bold uppercase leading-relaxed px-4">
                Sistem akan memverifikasi Nama Anda secara otomatis berdasarkan ID yang terdaftar.
            </p>
        </div>
    </section>

    <section id="page-admin" class="hidden max-w-4xl mx-auto p-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-blue-600 p-6 rounded-[2rem] text-white shadow-lg text-center">
                <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Hadir Hari Ini</p>
                <h2 id="today-total" class="text-5xl font-black">0</h2>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm flex flex-col justify-center gap-3 border border-slate-100">
                <button onclick="addManual()" class="w-full py-3 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-black">➕ Input Manual</button>
                <button onclick="fetchLogs()" class="w-full py-3 border border-slate-200 text-slate-600 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-50">🔄 Refresh</button>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col justify-center">
                <p class="text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest">Export Laporan</p>
                <input type="month" id="report-date" class="w-full p-2 text-xs border border-slate-100 rounded-lg mb-2 outline-none font-bold">
                <button onclick="generatePDF()" class="w-full py-2 bg-emerald-600 text-white rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-emerald-700">Download PDF</button>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-5 border-b bg-slate-50/50 font-black text-[10px] uppercase tracking-widest text-slate-400">Log Kehadiran Terbaru</div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <tbody id="log-table" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </section>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://cvswzigomnpnllsgcqoc.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ';
        const GUDANG_COORD = { lat: -4.429042, lng: 125.122123 }; // GANTI KOORDINAT GUDANG ANDA
        const RADIUS_LIMIT = 50; // Jarak maksimal dalam meter

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentPos = null;
        let isUserValid = false;

        document.getElementById('report-date').value = new Date().toISOString().slice(0, 7);

        // --- 1. VERIFIKASI PEGAWAI (TABEL MASTER) ---
        async function verifyEmployee() {
            const idInput = document.getElementById('emp-code').value.trim();
            const statusTitle = document.getElementById('status-title');
            
            if (idInput.length < 5) {
                isUserValid = false;
                updateButtonState();
                return;
            }

            const { data, error } = await supabase
                .from('pegawai')
                .select('nama')
                .eq('id', idInput)
                .single();

            if (data) {
                statusTitle.innerText = `Halo, ${data.nama}`;
                statusTitle.className = "text-[10px] font-black text-blue-600 uppercase tracking-widest text-center";
                localStorage.setItem('karyawan_id', idInput);
                isUserValid = true;
            } else {
                statusTitle.innerText = "ID TIDAK TERDAFTAR";
                statusTitle.className = "text-[10px] font-black text-red-500 uppercase tracking-widest text-center";
                isUserValid = false;
            }
            updateButtonState();
        }

        // --- 2. GPS TRACKING ---
        function initGPS() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition(pos => {
                currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                const distance = getDistance(currentPos.lat, currentPos.lng, GUDANG_COORD.lat, GUDANG_COORD.lng);
                
                document.getElementById('status-desc').innerText = `Jarak: ${Math.round(distance)} meter dari lokasi`;
                updateButtonState(distance);
            }, null, { enableHighAccuracy: true });
        }

        function updateButtonState(dist = null) {
            const btn = document.getElementById('main-btn');
            const card = document.getElementById('status-card');
            const currentDist = dist || getDistance(currentPos?.lat || 0, currentPos?.lng || 0, GUDANG_COORD.lat, GUDANG_COORD.lng);

            if (currentDist <= RADIUS_LIMIT && isUserValid) {
                btn.disabled = false;
                btn.className = "btn-blue w-full py-5 rounded-2xl font-black text-lg uppercase tracking-widest transition-all active:scale-95 shadow-lg";
                card.classList.add('bg-blue-50', 'border-blue-100');
            } else {
                btn.disabled = true;
                btn.className = "btn-disabled w-full py-5 rounded-2xl font-black text-lg uppercase tracking-widest";
                card.classList.remove('bg-blue-50', 'border-blue-100');
            }
        }

        // --- 3. SUBMIT ABSENSI ---
        async function submitAbsen() {
            const id = document.getElementById('emp-code').value.trim();
            
            Swal.fire({ title: 'Mencatat...', didOpen: () => Swal.showLoading() });
            
            const { error } = await supabase.from('attendance').insert([
                { employee_code: id, lat: currentPos.lat, lng: currentPos.lng, is_on_site: true }
            ]);

            if (!error) {
                Swal.fire({ icon: 'success', title: 'Berhasil Absen', text: 'Data kehadiran telah masuk ke sistem.', showConfirmButton: false, timer: 2000 });
            } else {
                Swal.fire('Gagal', error.message, 'error');
            }
        }

        // --- 4. DASHBOARD & ADMIN ---
        async function showPage(page) {
            if (page === 'admin') {
                const { value: pass } = await Swal.fire({ title: 'Area Admin', input: 'password', inputPlaceholder: 'Masukkan Password', showCancelButton: true });
                if (pass === 'je1234') { // Ganti password di sini
                    renderUI('admin');
                    fetchLogs();
                }
            } else {
                renderUI('absen');
            }
        }

        function renderUI(p) {
            document.getElementById('page-absen').classList.toggle('hidden', p !== 'absen');
            document.getElementById('page-admin').classList.toggle('hidden', p !== 'admin');
            document.getElementById('nav-absen').className = p === 'absen' ? 'flex-1 py-5 text-[10px] uppercase tracking-widest nav-active' : 'flex-1 py-5 text-[10px] uppercase tracking-widest text-slate-400';
            document.getElementById('nav-admin').className = p === 'admin' ? 'flex-1 py-5 text-[10px] uppercase tracking-widest nav-active' : 'flex-1 py-5 text-[10px] uppercase tracking-widest text-slate-400';
        }

        async function fetchLogs() {
            const { data } = await supabase.from('attendance').select('*').order('check_in', { ascending: false }).limit(20);
            if (data) {
                const today = new Date().toISOString().slice(0, 10);
                document.getElementById('today-total').innerText = data.filter(d => d.date === today).length;
                document.getElementById('log-table').innerHTML = data.map(d => `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4 font-black text-[11px] uppercase">${d.employee_code.substring(0,8)}...</td>
                        <td class="p-4 text-[10px] text-slate-400 font-bold">${new Date(d.check_in).toLocaleTimeString('id-ID')}</td>
                        <td class="p-4 text-right"><button onclick="deleteLog('${d.id}')" class="text-red-400 text-[10px] font-black uppercase tracking-widest hover:text-red-600">Hapus</button></td>
                    </tr>
                `).join('');
            }
        }

        async function addManual() {
            const { value: id } = await Swal.fire({ title: 'Absen Manual', text: 'Masukkan ID Karyawan', input: 'text', showCancelButton: true });
            if (id) {
                await supabase.from('attendance').insert([{ employee_code: id, is_on_site: true }]);
                fetchLogs();
            }
        }

        async function deleteLog(id) {
            const res = await Swal.fire({ title: 'Hapus Data?', text: 'Tindakan ini permanen', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444' });
            if (res.isConfirmed) {
                await supabase.from('attendance').delete().eq('id', id);
                fetchLogs();
            }
        }

        async function generatePDF() {
            const month = document.getElementById('report-date').value;
            const { data } = await supabase.from('attendance').select('*').gte('date', `${month}-01`).lte('date', `${month}-31`).order('date', { ascending: true });
            
            if (!data || data.length === 0) return Swal.fire('Data Kosong', '', 'info');
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18); doc.text("LAPORAN ABSENSI COCO-LOGISTICS", 14, 20);
            doc.setFontSize(10); doc.text(`Periode Bulan: ${month}`, 14, 28);
            
            doc.autoTable({
                startY: 35,
                head: [['No', 'ID Karyawan', 'Tanggal', 'Jam']],
                body: data.map((d, i) => [i+1, d.employee_code, d.date, new Date(d.check_in).toLocaleTimeString('id-ID')]),
                headStyles: { fillColor: [37, 99, 235] }
            });
            doc.save(`Laporan_${month}.pdf`);
        }

        // --- MATH HELPERS ---
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2) * Math.sin(dl/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // --- INITIALIZATION ---
        window.onload = () => {
            const saved = localStorage.getItem('karyawan_id');
            const urlParams = new URLSearchParams(window.location.search);
            const idFromURL = urlParams.get('id');

            if (idFromURL) {
                document.getElementById('emp-code').value = idFromURL;
            } else if (saved) {
                document.getElementById('emp-code').value = saved;
            }
            
            verifyEmployee();
            initGPS();
            document.getElementById('emp-code').addEventListener('input', verifyEmployee);
        };
    </script>
</body>
</html>
