<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST ABSENSI - Final System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .btn-blue { background: #2563eb; color: white; font-weight: 800; }
        .btn-disabled { background: #cbd5e1 !important; color: #94a3b8 !important; cursor: not-allowed; }
        .nav-active { color: #2563eb; border-bottom: 4px solid #2563eb; font-weight: 800; }
    </style>
</head>
<body class="pb-10">

    <nav class="fixed top-0 left-0 right-0 z-[999] bg-white border-b shadow-sm flex">
        <button onclick="renderPage('absen')" id="nav-absen" class="flex-1 py-4 text-[10px] font-black uppercase nav-active">📲 Absen</button>
        <button onclick="askAdmin()" id="nav-admin" class="flex-1 py-4 text-[10px] font-black uppercase text-slate-400 border-b-4 border-transparent">📊 Admin</button>
    </nav>

    <div class="h-20"></div>

    <section id="page-absen" class="max-w-md mx-auto p-6 space-y-6">
        <div class="text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto mb-3 flex items-center justify-center shadow-lg">
                <span class="text-white font-black text-2xl italic">CL</span>
            </div>
            <h1 class="text-2xl font-black italic text-blue-600">ABSENSI-KARYAWAN</h1>
            
            <div id="gps-card" class="mt-4 p-4 bg-white rounded-2xl border border-slate-200 shadow-sm">
                <p id="st-title" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Mencari GPS...</p>
                <p id="st-dist" class="text-[9px] text-slate-400 mt-1 italic italic">Izin lokasi diperlukan</p>
            </div>
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl space-y-5">
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2 block mb-1">ID Karyawan (UUID)</label>
                <input type="text" id="emp-code" placeholder="Tempel ID Anda" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-bold text-center text-sm shadow-inner transition-all">
            </div>
            <button id="btn-submit" onclick="submitAbsen()" disabled class="btn-disabled w-full py-5 rounded-2xl font-black text-lg uppercase shadow-lg transition-all active:scale-95">
                Absen Sekarang
            </button>
            <p class="text-[9px] text-center text-slate-400 font-bold uppercase px-4 leading-tight">
                ID Anda akan tersimpan otomatis setelah absen pertama berhasil.
            </p>
        </div>
    </section>

    <section id="page-admin" class="hidden max-w-4xl mx-auto p-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Laporan Bulanan</p>
                <input type="month" id="rep-mo" class="w-full p-2 mt-2 border rounded-lg text-xs outline-none font-bold">
                <button onclick="downloadLaporan()" class="w-full mt-2 py-2 bg-emerald-600 text-white rounded-lg text-[10px] font-black uppercase">Download PDF</button>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 text-center">Tindakan Admin</p>
                <button onclick="bukaInputManual()" class="w-full py-4 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase tracking-widest">➕ Absen Manual</button>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm overflow-hidden border border-slate-100">
            <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                <span class="text-[10px] font-black text-slate-400 uppercase">Log Kehadiran</span>
                <button onclick="loadData()" class="text-blue-600 text-[10px] font-bold uppercase">Refresh</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <tbody id="log-body" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </section>

    <script>
        // --- 1. KONFIGURASI (WAJIB DIISI) ---
        const SB_URL = 'https://cvswzigomnpnllsgcqoc.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ';
        const GUDANG = { lat: 1.429042, lng: 125.122123 }; // Koordinat Gudang Anda
        const JARAK_MAX = 50; // Jarak dalam meter

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let userPos = null;

        // --- 2. GPS LOGIC ---
        function startGPS() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition(pos => {
                userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                const d = calcDist(userPos.lat, userPos.lng, GUDANG.lat, GUDANG.lng);
                document.getElementById('st-dist').innerText = `Jarak: ${Math.round(d)} meter dari lokasi`;
                
                const btn = document.getElementById('btn-submit');
                const st = document.getElementById('st-title');
                
                if (d <= JARAK_MAX) {
                    btn.disabled = false; btn.className = "btn-blue w-full py-5 rounded-2xl font-black text-lg uppercase shadow-lg";
                    st.innerText = "📍 LOKASI TERVERIFIKASI"; st.className = "text-[10px] font-black text-emerald-500 uppercase";
                } else {
                    btn.disabled = true; btn.className = "btn-disabled w-full py-5 rounded-2xl font-black text-lg uppercase";
                    st.innerText = "DILUAR RADIUS KANTOR"; st.className = "text-[10px] font-black text-red-400 uppercase";
                }
            }, null, { enableHighAccuracy: true });
        }

        // --- 3. NAVIGASI ---
        async function askAdmin() {
            const { value: p } = await Swal.fire({ title: 'Akses Admin', input: 'password', inputPlaceholder: 'Masukkan Password', showCancelButton: true });
            if (p === '1234') renderPage('admin');
            else if (p) Swal.fire('Salah!', 'Password yang ngana masukkan salah.', 'error');
        }

        function renderPage(p) {
            document.getElementById('page-absen').classList.toggle('hidden', p !== 'absen');
            document.getElementById('page-admin').classList.toggle('hidden', p !== 'admin');
            document.getElementById('nav-absen').className = `flex-1 py-4 text-[10px] font-black uppercase ${p==='absen'?'nav-active':'text-slate-400'}`;
            document.getElementById('nav-admin').className = `flex-1 py-4 text-[10px] font-black uppercase ${p==='admin'?'nav-active':'text-slate-400'}`;
            if(p === 'admin') loadData();
        }

        // --- 4. AKSI ABSEN ---
        async function submitAbsen() {
            const id = document.getElementById('emp-code').value.trim();
            if(!id) return Swal.fire('ID Kosong', '', 'warning');
            
            Swal.fire({ title: 'Memverifikasi ID...', didOpen: () => Swal.showLoading() });
            
            // Cek ke tabel pegawai
            const { data: p } = await supabaseClient.from('pegawai').select('nama').eq('id', id).single();
            if(!p) return Swal.fire('Gagal', 'ID tidak terdaftar di sistem pegawai.', 'error');

            const { error } = await supabaseClient.from('attendance').insert([{ employee_code: id, lat: userPos.lat, lng: userPos.lng, is_on_site: true }]);
            if(!error) {
                Swal.fire('Berhasil!', `Halo ${p.nama}, absensi Anda telah dicatat.`, 'success');
                localStorage.setItem('karyawan_id', id);
            } else {
                Swal.fire('Error', error.message, 'error');
            }
        }

        // --- 5. ABSEN MANUAL (FUNGSI TERBARU) ---
        async function bukaInputManual() {
            const { value: idKaryawan } = await Swal.fire({
                title: 'Absen Manual Admin',
                text: 'Masukkan UUID dari tabel pegawai',
                input: 'text',
                showCancelButton: true,
                inputValidator: (v) => !v && 'ID tidak boleh kosong!'
            });

            if (idKaryawan) {
                const { error } = await supabaseClient.from('attendance').insert([{ employee_code: idKaryawan, is_on_site: true }]);
                if (!error) {
                    Swal.fire('Berhasil!', 'Data manual masuk.', 'success');
                    loadData();
                } else {
                    Swal.fire('Gagal', error.message, 'error');
                }
            }
        }

        // --- 6. DATA ADMIN ---
        async function loadData() {
            const { data } = await supabaseClient.from('attendance').select('*').order('check_in', { ascending: false }).limit(30);
            if(data) {
                document.getElementById('log-body').innerHTML = data.map(d => `
                    <tr class="hover:bg-slate-50">
                        <td class="p-4 font-black text-[10px] uppercase text-slate-600">${d.employee_code.substring(0,8)}...</td>
                        <td class="p-4 text-right text-[10px] text-slate-400 font-bold">${new Date(d.check_in).toLocaleTimeString('id-ID')}</td>
                    </tr>
                `).join('');
            }
        }

        async function downloadLaporan() {
            const mo = document.getElementById('rep-mo').value;
            const { data } = await supabaseClient.from('attendance').select('*').gte('date', `${mo}-01`).lte('date', `${mo}-31`);
            if(!data || data.length === 0) return Swal.fire('Tidak ada data', '', 'info');
            
            const doc = new jspdf.jsPDF();
            doc.text(`LAPORAN ABSENSI - ${mo}`, 14, 20);
            doc.autoTable({
                startY: 25,
                head: [['No', 'ID', 'Tanggal', 'Jam']],
                body: data.map((d, i) => [i+1, d.employee_code.substring(0,8), d.date, new Date(d.check_in).toLocaleTimeString()]),
                headStyles: { fillColor: [37, 99, 235] }
            });
            doc.save(`Laporan_${mo}.pdf`);
        }

        function calcDist(l1, n1, l2, n2) {
            const R = 6371e3; const p1 = l1*Math.PI/180; const p2 = l2*Math.PI/180;
            const dL = (l2-l1)*Math.PI/180; const dN = (n2-n1)*Math.PI/180;
            const a = Math.sin(dL/2)**2 + Math.cos(p1)*Math.cos(p2) * Math.sin(dN/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const idParam = urlParams.get('id');
            const saved = localStorage.getItem('karyawan_id');
            if(idParam) document.getElementById('emp-code').value = idParam;
            else if(saved) document.getElementById('emp-code').value = saved;
            startGPS();
        };
    </script>
</body>
</html>
