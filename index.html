<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Maumbi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root { --primary: #4facfe; --secondary: #00f2fe; }
        body { background: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app-card { width: 90%; max-width: 400px; background: white; border-radius: 25px; padding: 30px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .loc-box { background: #fff5e6; padding: 10px; border-radius: 15px; margin-bottom: 20px; font-weight: bold; border: 1px solid #ffe0b3; }
        
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; text-align: center; margin-bottom: 20px; font-size: 1.1rem; box-sizing: border-box; }
        
        .mode-switch { display: flex; gap: 10px; margin-bottom: 25px; }
        .mode-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #eee; background: #f9f9f9; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .active { background: var(--primary) !important; color: white !important; border-color: var(--primary) !important; box-shadow: 0 4px 12px rgba(79, 172, 254, 0.3); }
        
        .fingerprint-btn {
            width: 130px; height: 130px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: 8px solid #f0f0f0; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px auto; cursor: pointer; transition: 0.3s; color: white; font-size: 55px;
        }
        .disabled { background: #dcdcdc !important; border-color: #f0f0f0 !important; cursor: not-allowed; filter: grayscale(1); opacity: 0.5; }
        
        #statusLabel { font-size: 0.9rem; color: #666; font-weight: 500; }
    </style>
</head>
<body>

<div class="app-card">
    <h2 style="margin-top: 0; color: #333;">Maumbi Absensi</h2>
    
    <div id="locStatus" class="loc-box" style="color: #e67e22;">🛰️ Memulai GPS...</div>

    <input type="text" id="empCode" placeholder="Masukkan UUID Pegawai">

    <div class="mode-switch">
        <button id="btnIn" class="mode-btn active" onclick="setMode('masuk')">MASUK</button>
        <button id="btnOut" class="mode-btn" onclick="setMode('pulang')">PULANG</button>
    </div>

    <div id="fingerBtn" class="fingerprint-btn disabled" onclick="prosesAbsen()">
        <i class="fa-solid fa-fingerprint"></i>
    </div>
    
    <p id="statusLabel">Menunggu lokasi akurat...</p>
</div>

<script>
    // --- 1. KONFIGURASI SUPABASE ---
    const SB_URL = "https://cvswzigomnpnllsgcqoc.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ";
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    // --- 2. DATA DEFAULT (Cadangan jika DB telat) ---
    let CONFIG = { 
        lat: 1.475817, 
        lng: 124.922390, 
        radius: 150, 
        jamMasuk: 9, 
        jamPulang: 17 
    };

    let currentMode = 'masuk';
    let userInside = false;

    // --- 3. FUNGSI AMBIL SETTING DARI DATABASE (Struktur Key-Value) ---
    async function loadSettings() {
        try {
            const { data, error } = await supabase.from('settings').select('key, value');
            if (data) {
                data.forEach(item => {
                    if (item.key === 'latitude_pusat') CONFIG.lat = parseFloat(item.value);
                    if (item.key === 'longitude_pusat') CONFIG.lng = parseFloat(item.value);
                    if (item.key === 'radius_absen') CONFIG.radius = parseInt(item.value);
                    if (item.key === 'jam_masuk') CONFIG.jamMasuk = parseInt(item.value.split(':')[0]);
                    if (item.key === 'jam_pulang') CONFIG.jamPulang = parseInt(item.value.split(':')[0]);
                });
                console.log("Settings updated from DB");
            }
        } catch (e) { console.error("Gagal load DB, pakai cadangan."); }
    }

    // --- 4. KONTROL MODE (MASUK/PULANG) ---
    function setMode(m) {
        currentMode = m;
        document.getElementById('btnIn').classList.toggle('active', m === 'masuk');
        document.getElementById('btnOut').classList.toggle('active', m === 'pulang');
        updateUI();
    }

    // --- 5. TRACKING LOKASI OTOMATIS ---
    function initGPS() {
        if (!navigator.geolocation) {
            document.getElementById('locStatus').innerText = "GPS Tidak Didukung";
            return;
        }

        navigator.geolocation.watchPosition((pos) => {
            const R = 6371e3; // Radius Bumi dalam meter
            const pLat = pos.coords.latitude;
            const pLng = pos.coords.longitude;
            
            // Rumus Haversine
            const dLat = (CONFIG.lat - pLat) * Math.PI/180;
            const dLon = (CONFIG.lng - pLng) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(pLat * Math.PI/180) * Math.cos(CONFIG.lat * Math.PI/180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            userInside = (dist <= CONFIG.radius);
            
            const statusDiv = document.getElementById('locStatus');
            if (userInside) {
                statusDiv.innerHTML = `<span style="color:green">✅ Area Absensi (${Math.round(dist)}m)</span>`;
                statusDiv.style.background = "#e6ffed";
            } else {
                statusDiv.innerHTML = `<span style="color:red">📍 Luar Radius (${Math.round(dist)}m)</span>`;
                statusDiv.style.background = "#fff5e6";
            }
            updateUI();
        }, (err) => {
            document.getElementById('locStatus').innerText = "⚠️ Aktifkan GPS & Izin Lokasi";
        }, { enableHighAccuracy: true, maximumAge: 0 });
    }

    // --- 6. UPDATE TAMPILAN TOMBOL ---
    function updateUI() {
        const btn = document.getElementById('fingerBtn');
        const label = document.getElementById('statusLabel');
        const jamSekarang = new Date().getHours();

        if (!userInside) {
            btn.classList.add('disabled');
            label.innerText = "Anda harus berada di kantor";
            return;
        }

        if (currentMode === 'masuk' && jamSekarang < CONFIG.jamMasuk) {
            btn.classList.add('disabled');
            label.innerText = `Absen Masuk dibuka jam ${CONFIG.jamMasuk}:00`;
        } else if (currentMode === 'pulang' && jamSekarang < CONFIG.jamPulang) {
            btn.classList.add('disabled');
            label.innerText = `Absen Pulang dibuka jam ${CONFIG.jamPulang}:00`;
        } else {
            btn.classList.remove('disabled');
            label.innerText = "Silakan ketuk sidik jari";
        }
    }

    // --- 7. PROSES SIMPAN KE DATABASE ---
    async function prosesAbsen() {
        const btn = document.getElementById('fingerBtn');
        if (btn.classList.contains('disabled')) return;

        const code = document.getElementById('empCode').value;
        if (!code) return Swal.fire("UUID Kosong", "Isi UUID pegawai dulu Pak", "warning");

        Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});

        const waktuSekarang = new Date();

        if (currentMode === 'masuk') {
            const { error } = await supabase.from('attendance').insert([
                { employee_code: code, status: 'Hadir', check_in: waktuSekarang }
            ]);
            if (error) return Swal.fire("Gagal", error.message, "error");
            Swal.fire("Berhasil", "Absen Masuk Tercatat", "success");
        } else {
            // Update baris absen hari ini yang jam pulang-nya masih kosong
            const { error } = await supabase.from('attendance')
                .update({ check_out: waktuSekarang })
                .eq('employee_code', code)
                .is('check_out', null);
            
            if (error) return Swal.fire("Gagal", error.message, "error");
            Swal.fire("Berhasil", "Absen Pulang Tercatat", "success");
        }
    }

    // Jalankan Semua
    initGPS();
    loadSettings();
</script>

</body>
</html>
