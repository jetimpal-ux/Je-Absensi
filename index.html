<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Maumbi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #4facfe; --secondary: #00f2fe; }
        body { background: #f8f9fa; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app-card { width: 90%; max-width: 400px; background: white; border-radius: 25px; padding: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .fingerprint-btn {
            width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: 8px solid #f0f0f0; display: flex; align-items: center; justify-content: center;
            margin: 20px auto; cursor: pointer; transition: 0.3s; color: white; font-size: 50px;
        }
        .disabled { background: #e0e0e0 !important; border-color: #f5f5f5 !important; cursor: not-allowed; filter: grayscale(1); opacity: 0.6; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; text-align: center; margin-bottom: 15px; }
        .mode-switch { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #eee; background: #fbfbfb; font-weight: bold; cursor: pointer; }
        .active { background: var(--primary) !important; color: white !important; }
        #locStatus { font-weight: bold; margin-bottom: 10px; font-size: 0.9rem; min-height: 20px; }
    </style>
</head>
<body>

<div class="app-card">
    <h2 style="margin-bottom: 10px;">Maumbi Absensi</h2>
    
    <div id="locStatus" style="color: orange;">Memuat Data Settings...</div>

    <input type="text" id="empCode" placeholder="Masukkan UUID">

    <div class="mode-switch">
        <button id="btnIn" class="mode-btn active" onclick="setMode('masuk')">MASUK</button>
        <button id="btnOut" class="mode-btn" onclick="setMode('pulang')">PULANG</button>
    </div>

    <div id="fingerBtn" class="fingerprint-btn disabled" onclick="prosesAbsen()">
        <i class="fa-solid fa-fingerprint"></i>
    </div>
    
    <p id="statusLabel" style="font-size: 0.8rem; color: #888;">Menunggu GPS...</p>
</div>

<script>
    const SB_URL = "https://cvswzigomnpnllsgcqoc.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ";
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    let CONFIG = { lat: 1.475817, lng: 124.922390, radius: 150, jamMasuk: 9, jamPulang: 17 };
    let currentMode = 'masuk';
    let userInside = false;

    // STEP 1: LOAD SETTINGS DARI DATABASE
    async function loadSettings() {
        try {
            const { data, error } = await supabase.from('settings').select('key, value');
            if (error) throw error;

            data.forEach(item => {
                if (item.key === 'latitude_pusat') CONFIG.lat = parseFloat(item.value);
                if (item.key === 'longitude_pusat') CONFIG.lng = parseFloat(item.value);
                if (item.key === 'radius_absen') CONFIG.radius = parseInt(item.value);
                if (item.key === 'jam_masuk') CONFIG.jamMasuk = parseInt(item.value.split(':')[0]);
                if (item.key === 'jam_pulang') CONFIG.jamPulang = parseInt(item.value.split(':')[0]);
            });

            document.getElementById('locStatus').innerText = "🛰️ Mencari Lokasi Pegawai...";
            startGPS(); // Hanya jalankan GPS jika setting berhasil dimuat
        } catch (err) {
            document.getElementById('locStatus').innerHTML = `<span style="color:red">Gagal Load Settings: ${err.message}</span>`;
        }
    }

    // STEP 2: JALANKAN GPS DENGAN DIAGNOSA ERROR
    function startGPS() {
        if (!navigator.geolocation) {
            document.getElementById('locStatus').innerText = "Browser tidak dukung GPS";
            return;
        }

        navigator.geolocation.watchPosition((pos) => {
            const R = 6371e3;
            const dLat = (CONFIG.lat - pos.coords.latitude) * Math.PI/180;
            const dLon = (CONFIG.lng - pos.coords.longitude) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(pos.coords.latitude*Math.PI/180)*Math.cos(CONFIG.lat*Math.PI/180)*Math.sin(dLon/2)**2;
            const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            userInside = (dist <= CONFIG.radius);
            document.getElementById('locStatus').innerHTML = userInside ? 
                `<span style="color:green">✅ Area Kantor (${Math.round(dist)}m)</span>` : 
                `<span style="color:red">📍 Luar Radius (${Math.round(dist)}m)</span>`;
            updateUI();
        }, (err) => {
            // DIAGNOSA MASALAH GPS
            let pesan = "GPS Error";
            if (err.code === 1) pesan = "Izin Lokasi Ditolak (Cek Setting Browser)";
            if (err.code === 2) pesan = "Sinyal GPS Hilang/Lemah";
            if (err.code === 3) pesan = "Waktu GPS Habis (Refresh Halaman)";
            document.getElementById('locStatus').innerHTML = `<span style="color:red">⚠️ ${pesan}</span>`;
        }, { 
            enableHighAccuracy: true, 
            timeout: 15000, 
            maximumAge: 0 
        });
    }

    function setMode(m) {
        currentMode = m;
        document.getElementById('btnIn').classList.toggle('active', m === 'masuk');
        document.getElementById('btnOut').classList.toggle('active', m === 'pulang');
        updateUI();
    }

    function updateUI() {
        const btn = document.getElementById('fingerBtn');
        const label = document.getElementById('statusLabel');
        const jam = new Date().getHours();

        if (userInside) {
            if (currentMode === 'masuk' && jam < CONFIG.jamMasuk) {
                btn.classList.add('disabled');
                label.innerText = `Masuk jam ${CONFIG.jamMasuk}:00`;
            } else if (currentMode === 'pulang' && jam < CONFIG.jamPulang) {
                btn.classList.add('disabled');
                label.innerText = `Pulang jam ${CONFIG.jamPulang}:00`;
            } else {
                btn.classList.remove('disabled');
                label.innerText = "Ketuk Sidik Jari";
            }
        } else {
            btn.classList.add('disabled');
            label.innerText = "Masuk ke area kantor";
        }
    }

    async function prosesAbsen() {
        if (document.getElementById('fingerBtn').classList.contains('disabled')) return;
        const code = document.getElementById('empCode').value;
        if (!code) return Swal.fire("Isi UUID!", "", "warning");

        Swal.fire({ title: 'Menyimpan...', didOpen: () => { Swal.showLoading(); }});

        const now = new Date();
        if (currentMode === 'masuk') {
            const { error } = await supabase.from('attendance').insert([{ employee_code: code, status: 'Hadir', check_in: now }]);
            error ? Swal.fire("Gagal", error.message, "error") : Swal.fire("Berhasil", "Selamat Bekerja", "success");
        } else {
            const { error } = await supabase.from('attendance').update({ check_out: now }).eq('employee_code', code).is('check_out', null);
            error ? Swal.fire("Gagal", error.message, "error") : Swal.fire("Berhasil", "Hati-hati di jalan", "success");
        }
    }

    loadSettings();
</script>
</body>
</html>
