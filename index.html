<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi QR Premium</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; }
        #reader { border: none !important; border-radius: 2rem; overflow: hidden; }
        #reader__dashboard { display: none !important; }
        video { border-radius: 2rem; object-fit: cover; }
        .swal2-popup { border-radius: 2.5rem !important; padding: 2rem !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-6xl mx-auto flex justify-around">
            <button onclick="showPage('scan')" id="btn-scan" class="flex-1 py-5 font-bold tracking-tight tab-active transition-all">📸 SCAN ABSEN</button>
            <button onclick="showPage('admin')" id="btn-admin" class="flex-1 py-5 font-bold tracking-tight text-slate-400 transition-all">📊 DASHBOARD</button>
        </div>
    </nav>

    <main id="page-scan" class="max-w-md mx-auto p-6 space-y-6">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-extrabold tracking-tighter text-slate-900">ABSENSI DIGITAL</h1>
            <div id="geo-status" class="inline-flex items-center gap-2 px-4 py-1.5 bg-slate-200 rounded-full text-[10px] font-bold text-slate-600 uppercase tracking-widest">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-amber-500"></span>
                </span>
                Mencari Sinyal GPS...
            </div>
        </div>
        
        <div class="relative group shadow-2xl rounded-[2.5rem] bg-black p-1.5 border-4 border-white transition-transform active:scale-[0.98]">
            <div id="reader"></div>
        </div>

        <div class="glass p-7 rounded-[2.5rem] border border-white shadow-xl space-y-4">
            <p class="text-center text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Pengajuan Izin</p>
            <input type="text" id="izin-code" placeholder="ID Karyawan (Contoh: KRY01)" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 border-none transition-all">
            <textarea id="izin-reason" rows="2" placeholder="Alasan izin..." class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 border-none transition-all"></textarea>
            <button onclick="submitIzin()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-lg hover:shadow-blue-200 transition-all active:scale-95">Kirim Izin</button>
        </div>
    </main>

    <main id="page-admin" class="hidden max-w-6xl mx-auto p-6 space-y-6">
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-7 rounded-[2.5rem] shadow-sm border border-slate-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total Hadir</p>
                <h2 id="stat-present" class="text-4xl font-extrabold tracking-tighter">0</h2>
            </div>
            <div class="bg-white p-7 rounded-[2.5rem] shadow-sm border border-slate-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Izin Pending</p>
                <h2 id="stat-leave" class="text-4xl font-extrabold tracking-tighter text-amber-500">0</h2>
            </div>
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
            <h3 class="font-bold text-slate-800 mb-6 flex items-center gap-2">
                <span class="w-2 h-6 bg-blue-600 rounded-full"></span> 
                Tren Kehadiran Mingguan
            </h3>
            <canvas id="attendanceChart" height="140"></canvas>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50/50">
                <h3 class="font-bold text-slate-800">Log Aktivitas Terbaru</h3>
                <button onclick="openReportModal()" class="px-5 py-2.5 bg-blue-600 text-white text-xs font-bold rounded-full shadow-lg hover:bg-blue-700 transition-all">REKAP BULANAN</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-400 text-[10px] uppercase tracking-[0.15em] font-bold">
                            <th class="p-6">Karyawan</th>
                            <th class="p-6">Waktu</th>
                            <th class="p-6 text-center">Lokasi</th>
                        </tr>
                    </thead>
                    <tbody id="attendance-list" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modal-report" class="hidden fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white rounded-[3rem] p-10 w-full max-w-sm shadow-2xl scale-in-center">
            <h3 class="font-extrabold text-2xl mb-2 text-center tracking-tight">Cetak Laporan</h3>
            <p class="text-center text-slate-400 text-sm mb-8">Pilih bulan untuk rekap data</p>
            <input type="month" id="report-month" class="w-full p-5 bg-slate-100 rounded-2xl outline-none mb-8 font-semibold text-slate-700">
            <div class="flex flex-col gap-3">
                <button onclick="generateReport()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg">Proses Rekap</button>
                <button onclick="closeModal()" class="w-full py-4 text-slate-400 font-bold">Batal</button>
            </div>
        </div>
    </div>

    <script>
        // 1. CONFIGURATION (GANTI DENGAN DATA ANDA)
        const SB_URL = 'https://cvswzigomnpnllsgcqoc.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ';
        const OFFICE = { lat: 1.475825, lng: 124.92275 }; // Ganti koordinat kantor
        const RADIUS_LIMIT = 50; // Jarak aman (meter)

        const supabase = supabase.createClient(SB_URL, SB_KEY);
        let userPos = null;
        let mainChart = null;

        // 2. STABLE GPS LOGIC (HYBRID)
        function startGPS() {
            if (!navigator.geolocation) return alert("GPS tidak didukung");
            
            navigator.geolocation.watchPosition(
                (p) => {
                    userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                    const el = document.getElementById('geo-status');
                    el.innerHTML = `<span class="h-2 w-2 rounded-full bg-emerald-500 mr-2"></span> GPS AKTIF (${Math.round(p.coords.accuracy)}m)`;
                    el.className = "inline-flex items-center px-4 py-1.5 bg-emerald-100 rounded-full text-[10px] font-bold text-emerald-600 uppercase tracking-widest";
                },
                (e) => { console.warn("GPS Error:", e.message); },
                { enableHighAccuracy: false, timeout: 10000 }
            );
        }

        // 3. DISTANCE CALC (HAVERSINE)
        function checkDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2) * Math.sin(Δλ/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // 4. SCAN SUCCESS & SWEETALERT
        async function onScanSuccess(decodedText) {
            if (!userPos) return Swal.fire('Tunggu GPS', 'Sinyal lokasi belum stabil', 'warning');
            
            const dist = checkDistance(userPos.lat, userPos.lng, OFFICE.lat, OFFICE.lng);
            
            if (dist > RADIUS_LIMIT) {
                return Swal.fire({
                    icon: 'error',
                    title: 'Di Luar Area',
                    text: `Jarak: ${Math.round(dist)}m. Batas: ${RADIUS_LIMIT}m`,
                    confirmButtonColor: '#1e293b'
                });
            }

            // Memproses ke Supabase
            Swal.fire({ title: 'Memverifikasi...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });

            const { error } = await supabase.from('attendance').insert([
                { employee_code: decodedText, lat: userPos.lat, lng: userPos.lng, is_on_site: true }
            ]);

            if (error) {
                Swal.fire('Gagal', error.message, 'error');
            } else {
                new Audio('https://www.soundjay.com/buttons/beep-07a.mp3').play();
                Swal.fire({
                    icon: 'success',
                    title: 'Absen Berhasil!',
                    text: 'Selamat bekerja, tetap semangat!',
                    showConfirmButton: false,
                    timer: 2000,
                    timerProgressBar: true
                }).then(() => location.reload());
            }
        }

        // 5. NAV & ADMIN LOGIC
        function showPage(p) {
            document.getElementById('page-scan').classList.toggle('hidden', p !== 'scan');
            document.getElementById('page-admin').classList.toggle('hidden', p !== 'admin');
            document.getElementById('btn-scan').classList.toggle('tab-active', p === 'scan');
            document.getElementById('btn-admin').classList.toggle('tab-active', p === 'admin');
            if(p === 'admin') { loadData(); updateChart(); }
        }

        async function loadData() {
            const { data } = await supabase.from('attendance').select('*').order('check_in', { ascending: false }).limit(10);
            document.getElementById('stat-present').innerText = data.length;
            
            const list = document.getElementById('attendance-list');
            list.innerHTML = data.map(i => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-6 font-bold text-slate-700">${i.employee_code}</td>
                    <td class="p-6 text-slate-400 text-xs font-semibold">${new Date(i.check_in).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</td>
                    <td class="p-6 text-center">
                        <span class="px-3 py-1 rounded-full text-[9px] font-black ${i.is_on_site ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}">
                            ${i.is_on_site ? 'LOKASI SESUAI' : 'LUAR AREA'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        async function updateChart() {
            const { data, error } = await supabase.rpc('get_weekly_attendance_stats');
            if (error) return;

            if(mainChart) mainChart.destroy();
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            mainChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.day_name),
                    datasets: [{
                        data: data.map(d => d.total_present),
                        borderColor: '#2563eb',
                        borderWidth: 4,
                        pointBackgroundColor: '#fff',
                        pointBorderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(37, 99, 235, 0.05)'
                    }]
                },
                options: { 
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, grid: { display: false }, ticks: { stepSize: 1 } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // 6. INITIALIZE
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
        startGPS();

        // 7. MODAL & IZIN
        function openReportModal() { document.getElementById('modal-report').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal-report').classList.add('hidden'); }
        async function submitIzin() {
            const code = document.getElementById('izin-code').value;
            const res = document.getElementById('izin-reason').value;
            if(!code || !res) return Swal.fire('Lengkapi Data', 'ID dan Alasan wajib diisi', 'warning');
            const { error } = await supabase.from('leave_requests').insert([{ employee_code: code, reason: res }]);
            if (error) Swal.fire('Error', 'Gagal kirim izin', 'error');
            else Swal.fire('Terkirim', 'Izin Anda akan diproses admin', 'success');
        }
    </script>
</body>
</html>
