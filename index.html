<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Absensi QR - Stable GPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; }
        #reader { width: 100% !important; border: none !important; border-radius: 1.5rem; overflow: hidden; }
        #reader__dashboard { display: none !important; }
        video { border-radius: 1.5rem; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 min-h-screen">

    <nav class="sticky top-0 z-50 bg-white shadow-sm border-b">
        <div class="max-w-6xl mx-auto flex justify-around">
            <button onclick="showPage('scan')" id="btn-scan" class="flex-1 py-4 font-bold tab-active">📸 SCAN</button>
            <button onclick="showPage('admin')" id="btn-admin" class="flex-1 py-4 font-bold text-slate-400">📊 ADMIN</button>
        </div>
    </nav>

    <main id="page-scan" class="max-w-md mx-auto p-6 space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-black text-slate-800 tracking-tighter">ABSENSI PRO</h1>
            <p id="geo-status" class="text-xs font-bold mt-2 py-1 px-3 bg-slate-200 inline-block rounded-full text-slate-600">
                🟡 Menghubungkan GPS...
            </p>
        </div>
        
        <div class="relative shadow-2xl rounded-[2rem] bg-black p-1">
            <div id="reader"></div>
        </div>

        <div class="glass p-6 rounded-[2rem] border border-white shadow-xl space-y-4">
            <h3 class="text-center font-bold text-slate-400 text-xs uppercase tracking-widest">Pengajuan Izin</h3>
            <input type="text" id="izin-code" placeholder="Kode Karyawan" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            <textarea id="izin-reason" rows="2" placeholder="Alasan..." class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all"></textarea>
            <button onclick="submitIzin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 active:scale-95 transition">KIRIM IZIN</button>
        </div>
    </main>

    <main id="page-admin" class="hidden max-w-6xl mx-auto p-6 space-y-6">
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Hadir</p>
                <h2 id="stat-present" class="text-3xl font-black">0</h2>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Izin</p>
                <h2 id="stat-leave" class="text-3xl font-black text-amber-500">0</h2>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
            <h3 class="font-bold mb-4">Tren Kehadiran (7 Hari)</h3>
            <canvas id="attendanceChart" height="150"></canvas>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-5 border-b flex justify-between items-center bg-slate-50/50">
                <h3 class="font-bold">Log Aktivitas</h3>
                <button onclick="openReportModal()" class="text-xs font-bold bg-slate-800 text-white px-4 py-2 rounded-full">REKAP PDF</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="text-slate-400 text-[10px] uppercase tracking-widest">
                            <th class="p-5">Karyawan</th>
                            <th class="p-5">Waktu</th>
                            <th class="p-5 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="attendance-list" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modal-report" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl">
            <h3 class="font-bold text-xl mb-2 text-center">Cetak Laporan</h3>
            <p class="text-center text-slate-400 text-sm mb-6">Pilih bulan rekap absensi</p>
            <input type="month" id="report-month" class="w-full p-4 bg-slate-100 rounded-2xl outline-none mb-6">
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 font-bold text-slate-400">BATAL</button>
                <button onclick="generateReport()" class="flex-1 bg-blue-600 text-white p-4 rounded-2xl font-bold">PROSES</button>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI ---
        const SUPABASE_URL = 'https://cvswzigomnpnllsgcqoc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ';
        const OFFICE = { lat: 1.429042, lng: 125.122123 }; // GANTI KOORDINAT ANDA
        const RADIUS = 50; // Meter

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let userLocation = null;
        let chartInstance = null;

        // --- STABLE GPS LOGIC ---
        function initGPS() {
            if (!navigator.geolocation) return alert("Browser tidak mendukung GPS");
            
            const geoOptions = {
                enableHighAccuracy: false, // Set ke FALSE agar lebih cepat dapat sinyal di gedung
                timeout: 5000,
                maximumAge: 10000
            };

            navigator.geolocation.watchPosition(
                (pos) => {
                    userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    const el = document.getElementById('geo-status');
                    el.innerText = `🟢 GPS AKTIF (${Math.round(pos.coords.accuracy)}m)`;
                    el.className = "text-[10px] font-bold mt-2 py-1 px-3 bg-emerald-100 text-emerald-600 inline-block rounded-full";
                },
                (err) => {
                    console.warn("GPS Error:", err.message);
                    document.getElementById('geo-status').innerText = "🟡 Mencoba Akurasi Rendah...";
                },
                geoOptions
            );
        }

        // --- DISTANCE CALCULATION ---
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2) * Math.sin(dl/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // --- SCAN QR ---
        async function onScanSuccess(decodedText) {
            if (!userLocation) return alert("Sinyal GPS belum stabil. Tunggu sebentar.");
            
            const dist = getDistance(userLocation.lat, userLocation.lng, OFFICE.lat, OFFICE.lng);
            
            if (dist > RADIUS) {
                return alert(`DI LUAR RADIUS! Jarak Anda: ${Math.round(dist)}m. Batas: ${RADIUS}m.`);
            }

            const { error } = await supabaseClient.from('attendance').insert([
                { employee_code: decodedText, lat: userLocation.lat, lng: userLocation.lng, is_on_site: true }
            ]);

            if (error) alert("Gagal Absen: " + error.message);
            else {
                alert("BERHASIL! Selamat Bekerja.");
                location.reload();
            }
        }

        const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        scanner.render(onScanSuccess);
        initGPS();

        // --- ADMIN & CHART LOGIC ---
        function showPage(page) {
            document.getElementById('page-scan').classList.toggle('hidden', page !== 'scan');
            document.getElementById('page-admin').classList.toggle('hidden', page !== 'admin');
            document.getElementById('btn-scan').classList.toggle('tab-active', page === 'scan');
            document.getElementById('btn-admin').classList.toggle('tab-active', page === 'admin');
            if(page === 'admin') {
                loadAttendance();
                renderWeeklyChart();
            }
        }

        async function loadAttendance() {
            const { data } = await supabaseClient.from('attendance').select('*').order('check_in', { ascending: false }).limit(10);
            document.getElementById('stat-present').innerText = data.length;
            
            const list = document.getElementById('attendance-list');
            list.innerHTML = data.map(item => `
                <tr>
                    <td class="p-5 font-bold">${item.employee_code}</td>
                    <td class="p-5 text-slate-500 text-xs">${new Date(item.check_in).toLocaleTimeString()}</td>
                    <td class="p-5 text-center">
                        <span class="px-2 py-1 rounded-full text-[9px] font-black ${item.is_on_site ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'}">
                            ${item.is_on_site ? 'KANTOR' : 'LUAR'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        async function renderWeeklyChart() {
            const { data, error } = await supabaseClient.rpc('get_weekly_attendance_stats');
            if (error) return;

            if(chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.day_name),
                    datasets: [{
                        data: data.map(d => d.total_present),
                        borderColor: '#2563eb',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(37, 99, 235, 0.05)'
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
            });
        }

        // --- MODAL & REPORT ---
        function openReportModal() { document.getElementById('modal-report').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal-report').classList.add('hidden'); }
        async function generateReport() {
            const monthVal = document.getElementById('report-month').value;
            if(!monthVal) return alert("Pilih bulan!");
            const [y, m] = monthVal.split('-');
            const { data, error } = await supabaseClient.rpc('get_monthly_report', { target_month: parseInt(m), target_year: parseInt(y) });
            if (error) alert("Gagal tarik data");
            else {
                console.log("Data Laporan:", data);
                alert("Data berhasil ditarik ke console browser. Siap cetak PDF.");
            }
        }
    </script>
</body>
</html>
