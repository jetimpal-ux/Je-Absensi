<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Pro - Final</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 800; }
        #reader { border: none !important; border-radius: 2rem; overflow: hidden; width: 100% !important; }
        #reader__dashboard { display: none !important; }
        video { border-radius: 2rem; object-fit: cover; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="fixed top-0 left-0 right-0 z-[999] bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-6xl mx-auto flex">
            <button onclick="showPage('scan')" id="btn-scan" class="flex-1 py-5 text-sm tab-active">📸 SCAN ABSEN</button>
            <button onclick="showPage('admin')" id="btn-admin" class="flex-1 py-5 text-sm text-slate-400">📊 DASHBOARD</button>
        </div>
    </nav>

    <div class="h-20"></div>

    <section id="page-scan" class="max-w-md mx-auto p-6 space-y-6">
        <div class="text-center space-y-2">
            <h1 class="text-2xl font-extrabold tracking-tight">ABSENSI DIGITAL</h1>
            <div id="geo-status" class="inline-flex items-center gap-2 px-4 py-1.5 bg-slate-200 rounded-full text-[10px] font-bold text-slate-600">
                🟡 MENCARI SINYAL GPS...
            </div>
        </div>
        
        <div class="shadow-2xl rounded-[2.5rem] bg-black p-1 border-4 border-white overflow-hidden">
            <div id="reader"></div>
        </div>

        <div class="glass p-6 rounded-[2rem] border border-white shadow-lg space-y-4">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Pengajuan Izin</h3>
            <input type="text" id="izin-code" placeholder="Kode Karyawan" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
            <textarea id="izin-reason" rows="2" placeholder="Alasan izin..." class="w-full p-4 bg-slate-100 rounded-2xl outline-none"></textarea>
            <button onclick="submitIzin()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold active:scale-95 transition">Kirim Izin</button>
        </div>
    </section>

    <section id="page-admin" class="hidden max-w-6xl mx-auto p-6 space-y-6">
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Hadir Hari Ini</p>
                <h2 id="stat-present" class="text-3xl font-black">0</h2>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-amber-100">
                <p class="text-[10px] font-bold text-amber-500 uppercase">Izin Pending</p>
                <h2 id="stat-leave" class="text-3xl font-black text-amber-500">0</h2>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[2rem] shadow-sm">
            <h3 class="font-bold mb-4">Grafik Kehadiran Mingguan</h3>
            <canvas id="attendanceChart" height="150"></canvas>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm overflow-hidden">
            <div class="p-5 border-b flex justify-between items-center">
                <span class="font-bold">Log Absensi</span>
                <button onclick="loadData()" class="text-xs text-blue-600 font-bold">Refresh Data</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <tbody id="attendance-list" class="divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>
        </div>
    </section>

    <script>
        // --- 1. CONFIGURATION ---
        const SB_URL = 'https://cvswzigomnpnllsgcqoc.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ';
        const OFFICE = { lat: 1.429042, lng: 125.122123 }; // GANTI SESUAI LOKASI ANDA
        const RADIUS = 50; 

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let userPos = null;
        let chartInstance = null;

        // --- 2. GPS LOGIC ---
        function initGPS() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition(
                (pos) => {
                    userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    const el = document.getElementById('geo-status');
                    el.innerHTML = `🟢 GPS AKTIF (${Math.round(pos.coords.accuracy)}m)`;
                    el.className = "inline-flex items-center gap-2 px-4 py-1.5 bg-emerald-100 rounded-full text-[10px] font-bold text-emerald-600";
                },
                (err) => { console.warn("GPS Error", err) },
                { enableHighAccuracy: false, timeout: 15000 }
            );
        }

        // --- 3. PAGE NAVIGATION ---
        function showPage(page) {
            console.log("Navigasi ke:", page);
            document.getElementById('page-scan').classList.toggle('hidden', page !== 'scan');
            document.getElementById('page-admin').classList.toggle('hidden', page !== 'admin');
            
            // Toggle Button Style
            document.getElementById('btn-scan').classList.toggle('tab-active', page === 'scan');
            document.getElementById('btn-scan').classList.toggle('text-slate-400', page !== 'scan');
            document.getElementById('btn-admin').classList.toggle('tab-active', page === 'admin');
            document.getElementById('btn-admin').classList.toggle('text-slate-400', page !== 'admin');

            if (page === 'admin') { loadData(); updateChart(); }
        }

        // --- 4. SCANNER LOGIC ---
        async function onScanSuccess(decodedText) {
            if (!userPos) {
                Swal.fire('GPS Belum Siap', 'Mohon tunggu sinyal lokasi', 'warning');
                return;
            }

            // Hitung Jarak
            const dist = getDistance(userPos.lat, userPos.lng, OFFICE.lat, OFFICE.lng);
            if (dist > RADIUS) {
                Swal.fire('Di Luar Radius', `Jarak Anda ${Math.round(dist)}m dari kantor`, 'error');
                return;
            }

            Swal.fire({ title: 'Memverifikasi...', didOpen: () => Swal.showLoading() });

            const { error } = await supabaseClient.from('attendance').insert([
                { employee_code: decodedText, lat: userPos.lat, lng: userPos.lng, is_on_site: true }
            ]);

            if (!error) {
                new Audio('https://www.soundjay.com/buttons/beep-07a.mp3').play();
                Swal.fire({ icon: 'success', title: 'Berhasil!', showConfirmButton: false, timer: 1500 })
                .then(() => location.reload());
            } else {
                Swal.fire('Gagal', error.message, 'error');
            }
        }

        // --- 5. DATA LOGIC ---
        async function loadData() {
            const { data } = await supabaseClient.from('attendance').select('*').order('check_in', { ascending: false }).limit(10);
            if (data) {
                document.getElementById('stat-present').innerText = data.length;
                document.getElementById('attendance-list').innerHTML = data.map(i => `
                    <tr class="hover:bg-slate-50">
                        <td class="p-4 font-bold uppercase text-xs">${i.employee_code}</td>
                        <td class="p-4 text-[10px] text-slate-400">${new Date(i.check_in).toLocaleTimeString()}</td>
                        <td class="p-4 text-right">
                            <span class="px-2 py-1 rounded-full bg-emerald-100 text-emerald-600 text-[8px] font-black">HADIR</span>
                        </td>
                    </tr>
                `).join('');
            }
        }

        async function updateChart() {
            const { data } = await supabaseClient.rpc('get_weekly_attendance_stats');
            if (!data) return;

            if (chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.day_name),
                    datasets: [{
                        data: data.map(d => d.total_present),
                        borderColor: '#2563eb',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(37, 99, 235, 0.05)'
                    }]
                },
                options: { plugins: { legend: { display: false } } }
            });
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2) * Math.sin(dl/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function submitIzin() {
            const code = document.getElementById('izin-code').value;
            const res = document.getElementById('izin-reason').value;
            if(!code || !res) return Swal.fire('Lengkapi Data', '', 'warning');
            const { error } = await supabaseClient.from('leave_requests').insert([{ employee_code: code, reason: res }]);
            if (!error) Swal.fire('Terkirim', 'Izin akan diproses', 'success');
        }

        // --- 6. RUN ---
        initGPS();
        const scanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 });
        scanner.render(onScanSuccess);

    </script>
</body>
</html>
