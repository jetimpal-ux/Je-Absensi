<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Absen Mandiri & Admin</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .btn-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 800; }
        .glass-card { background: rgba(255, 255, 255, 0.9); border: 1px solid white; backdrop-filter: blur(10px); }
        .btn-disabled { background: #cbd5e1 !important; cursor: not-allowed; transform: none !important; }
    </style>
</head>
<body class="text-slate-900">

    <nav class="fixed top-0 left-0 right-0 z-[999] bg-white border-b shadow-sm">
        <div class="max-w-6xl mx-auto flex">
            <button onclick="showPage('absen')" id="nav-absen" class="flex-1 py-5 text-[10px] font-black uppercase tracking-widest btn-active">📲 Absen Karyawan</button>
            <button onclick="showPage('admin')" id="nav-admin" class="flex-1 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">📊 Dashboard Admin</button>
        </div>
    </nav>

    <div class="h-24"></div>

    <section id="page-absen" class="max-w-md mx-auto p-6 space-y-6">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-black italic text-blue-600 tracking-tighter">COCO-LOGISTICS</h1>
            <div id="loc-indicator" class="p-4 rounded-3xl bg-white shadow-sm border border-slate-200 transition-all">
                <p id="loc-text" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Mencari Koordinat GPS...</p>
                <p id="loc-detail" class="text-[9px] text-slate-400 mt-1 italic">Tunggu sebentar...</p>
            </div>
        </div>

        <div class="glass-card p-8 rounded-[2.5rem] shadow-xl space-y-5">
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block tracking-widest">ID Karyawan</label>
                <input type="text" id="emp-code" placeholder="KRY-001" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-bold uppercase text-center text-lg">
            </div>
            
            <button id="btn-submit" onclick="prosesAbsen()" disabled class="btn-disabled w-full py-5 rounded-2xl text-white font-black text-lg uppercase tracking-widest shadow-lg transition-all active:scale-95">
                Absen Sekarang
            </button>
            
            <p class="text-[9px] text-center text-slate-400 font-bold uppercase leading-relaxed tracking-tighter px-4">
                Tombol akan aktif otomatis jika posisi Anda sesuai dengan lokasi kantor
            </p>
        </div>
    </section>

    <section id="page-admin" class="hidden max-w-4xl mx-auto p-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-blue-600 p-6 rounded-[2rem] text-white shadow-lg text-center">
                <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Hadir Hari Ini</p>
                <h2 id="count-today" class="text-5xl font-black">0</h2>
            </div>
            
            <div class="bg-white p-6 rounded-[2rem] shadow-sm flex flex-col justify-center gap-3">
                <button onclick="tambahManual()" class="w-full py-3 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-black transition">➕ Tambah Manual</button>
                <button onclick="loadAdminData()" class="w-full py-3 border border-slate-200 text-slate-600 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-50 transition">🔄 Refresh Data</button>
            </div>

            <div class="bg-white p-6 rounded-[2rem] shadow-sm flex flex-col justify-center">
                <p class="text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest">Laporan Bulanan</p>
                <input type="month" id="filter-month" class="w-full p-2 text-xs border border-slate-100 rounded-lg mb-2 outline-none">
                <button onclick="cetakLaporanPDF()" class="w-full py-2 bg-emerald-600 text-white rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-emerald-700 transition">Cetak PDF</button>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50/50">
                <span class="font-black text-[10px] uppercase tracking-widest text-slate-500">Log Kehadiran Terbaru</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <tbody id="log-body" class="divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>
        </div>
    </section>

    <script>
        // --- KONFIGURASI ---
        const SB_URL = 'https://cvswzigomnpnllsgcqoc.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c3d6aWdvbW5wbmxsc2djcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODMzMTMsImV4cCI6MjA5MTQ1OTMxM30.QZ-FVL2o100ncLh70v8yg0TmtiFo7hA2fxlyhdRw9OQ';
        const OFFICE = { lat: 1.429042, lng: 125.122123 }; // Masukkan Koordinat Gudang Anda
        const LIMIT = 50; // Radius toleransi (50 meter)

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let userPos = null;

        // Set default filter bulan ke bulan ini
        document.getElementById('filter-month').value = new Date().toISOString().slice(0, 7);

        // --- GPS TRACKER ---
        function startGPS() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition(pos => {
                userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                const dist = calculateDistance(userPos.lat, userPos.lng, OFFICE.lat, OFFICE.lng);
                
                const btn = document.getElementById('btn-submit');
                const box = document.getElementById('loc-indicator');
                const txt = document.getElementById('loc-text');
                const det = document.getElementById('loc-detail');

                det.innerText = `Jarak Anda: ${Math.round(dist)} meter dari kantor`;

                if (dist <= LIMIT) {
                    btn.disabled = false;
                    btn.className = "w-full py-5 rounded-2xl bg-blue-600 text-white font-black text-lg uppercase tracking-widest shadow-lg active:scale-95 transition-all";
                    txt.innerText = "📍 LOKASI TERVERIFIKASI";
                    txt.className = "text-[10px] font-black text-emerald-500 uppercase tracking-widest";
                    box.classList.add('bg-emerald-50', 'border-emerald-200');
                } else {
                    btn.disabled = true;
                    btn.className = "btn-disabled w-full py-5 rounded-2xl text-white font-black text-lg uppercase tracking-widest shadow-lg transition-all";
                    txt.innerText = "DI LUAR AREA KANTOR";
                    txt.className = "text-[10px] font-black text-red-400 uppercase tracking-widest";
                    box.classList.remove('bg-emerald-50', 'border-emerald-200');
                }
            }, (err) => {
                document.getElementById('loc-text').innerText = "ERROR: GPS MATI";
            }, { enableHighAccuracy: true });
        }

        // --- PROSES ABSEN ---
        async function prosesAbsen() {
            const code = document.getElementById('emp-code').value.toUpperCase().trim();
            if(!code) return Swal.fire('Kode Kosong', 'Masukkan ID Karyawan Anda', 'warning');

            Swal.fire({ title: 'Memproses...', didOpen: () => Swal.showLoading() });

            const { error } = await supabaseClient.from('attendance').insert([
                { employee_code: code, lat: userPos.lat, lng: userPos.lng, is_on_site: true }
            ]);

            if(!error) {
                Swal.fire({ icon: 'success', title: 'Berhasil Absen!', text: 'Semangat Bekerja!', showConfirmButton: false, timer: 2000 });
                document.getElementById('emp-code').value = '';
            } else {
                Swal.fire('Gagal', error.message, 'error');
            }
        }

        // --- ADMIN & SECURITY ---
        async function showPage(page) {
            if(page === 'admin') {
                const { value: pass } = await Swal.fire({
                    title: 'Akses Terbatas',
                    text: 'Masukkan Password Admin',
                    input: 'password',
                    inputPlaceholder: '••••',
                    showCancelButton: true,
                    confirmButtonColor: '#2563eb'
                });

                if (pass === 'je1234') { // Ganti Password Admin di sini
                    toggleUI('admin');
                    loadAdminData();
                } else if (pass !== undefined) {
                    Swal.fire('Gagal', 'Password Salah!', 'error');
                }
            } else {
                toggleUI('absen');
            }
        }

        function toggleUI(p) {
            document.getElementById('page-absen').classList.toggle('hidden', p !== 'absen');
            document.getElementById('page-admin').classList.toggle('hidden', p !== 'admin');
            document.getElementById('nav-absen').className = p === 'absen' ? 'flex-1 py-5 text-[10px] font-black uppercase tracking-widest btn-active' : 'flex-1 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400';
            document.getElementById('nav-admin').className = p === 'admin' ? 'flex-1 py-5 text-[10px] font-black uppercase tracking-widest btn-active' : 'flex-1 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400';
        }

        async function loadAdminData() {
            const { data } = await supabaseClient.from('attendance').select('*').order('check_in', { ascending: false }).limit(20);
            if(data) {
                const today = new Date().toISOString().slice(0, 10);
                document.getElementById('count-today').innerText = data.filter(d => d.date === today).length;
                document.getElementById('log-body').innerHTML = data.map(d => `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4 font-black text-xs uppercase">${d.employee_code}</td>
                        <td class="p-4 text-[10px] text-slate-400 font-bold italic">${new Date(d.check_in).toLocaleTimeString('id-ID')}</td>
                        <td class="p-4 text-right">
                            <button onclick="hapusLog('${d.id}')" class="text-red-400 text-[10px] font-black uppercase tracking-widest hover:text-red-600 transition">Hapus</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        async function tambahManual() {
            const { value: code } = await Swal.fire({ title: 'Input Manual', input: 'text', inputLabel: 'ID Karyawan', showCancelButton: true });
            if (code) {
                await supabaseClient.from('attendance').insert([{ employee_code: code.toUpperCase(), is_on_site: true }]);
                loadAdminData();
            }
        }

        async function hapusLog(id) {
            const res = await Swal.fire({ title: 'Hapus Data?', text: 'Data akan hilang permanen', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444' });
            if (res.isConfirmed) {
                await supabaseClient.from('attendance').delete().eq('id', id);
                loadAdminData();
            }
        }

        async function cetakLaporanPDF() {
            const month = document.getElementById('filter-month').value;
            const [year, mo] = month.split('-');
            const firstDay = `${month}-01`;
            const lastDay = new Date(year, mo, 0).toISOString().slice(0, 10);

            const { data } = await supabaseClient.from('attendance').select('*').gte('date', firstDay).lte('date', lastDay).order('date', { ascending: true });
            
            if(!data || data.length === 0) return Swal.fire('Kosong', 'Tidak ada data di bulan ini', 'info');
            
            const doc = new jspdf.jsPDF();
            doc.setFontSize(16);
            doc.text(`LAPORAN ABSENSI COCO-LOGISTICS - ${month}`, 14, 20);
            doc.autoTable({
                startY: 25,
                head: [['No', 'ID Karyawan', 'Tanggal', 'Waktu Masuk']],
                body: data.map((d, i) => [i+1, d.employee_code, d.date, new Date(d.check_in).toLocaleTimeString()],),
                headStyles: { fillColor: [37, 99, 235] }
            });
            doc.save(`Laporan_${month}.pdf`);
        }

        // --- MATH HELPER ---
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2) * Math.sin(dl/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        startGPS();
    </script>
</body>
</html>
